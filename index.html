<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAN WALLET</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; color: #fff; }
        #tela-login { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        input#pin { padding: 20px; width: 260px; border-radius: 15px; border: 2px solid #333; background: #111; color: #d4af37; font-size: 24px; text-align: center; outline: none; margin-bottom: 20px; }
        .btn-gold { padding: 18px; width: 280px; background: #fff; color: #000; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #conteudo-privado { display: none; padding: 20px; }
        .card-total { background: #111; padding: 30px; border-radius: 25px; border: 1px solid #222; text-align: center; margin-bottom: 20px; }
        .cliente-card { background: #0a180a; border: 1px solid #1e3a1e; border-radius: 20px; padding: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .acoes-btn { display: flex; flex-direction: column; gap: 5px; }
        button { cursor: pointer; }
    </style>
</head>
<body>

    <div id="tela-login">
        <h1 style="color:#fff; margin-bottom: 20px;">VAN WALLET</h1>
        <input type="tel" id="pin" placeholder="DIGITE O PIN" maxlength="6">
        <button class="btn-gold" onclick="login()">ENTRAR</button>
        <p onclick="limparMemoria()" style="color: #333; margin-top: 50px; font-size: 10px;">Resetar Sistema</p>
    </div>

    <div id="conteudo-privado">
        <div class="card-total">
            <small style="color: #666;">TOTAL A RECEBER</small>
            <h1 id="total-rua" style="font-size: 40px; color:#d4af37">R$ 0,00</h1>
        </div>
        <button class="btn-gold" style="width: 100%; margin-bottom: 20px;" onclick="novo()">+ NOVO EMPRÉSTIMO</button>
        <div id="lista"></div>
    </div>

    <script>
        // PIN PADRÃO: 102030
        const PIN_CORRETO = "102030";

        function login() {
            const input = document.getElementById('pin').value;
            console.log("Tentativa de login com:", input); // Para debug

            if(input === PIN_CORRETO) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                render();
            } else {
                alert("PIN INCORRETO! Tente 102030");
            }
        }

        let db = JSON.parse(localStorage.getItem('van_vFinal')) || [];

        function novo() {
            const nome = prompt("Nome do Cliente:");
            const valor = prompt("Valor Emprestado:");
            if(nome && valor) {
                const hoje = new Date();
                const venc = new Date();
                venc.setDate(hoje.getDate() + 7); // Padrão 7 dias para teste
                
                db.push({
                    id: Date.now(),
                    nome: nome,
                    capital: parseFloat(valor),
                    baseCobrar: parseFloat(valor) * 1.40,
                    venci: venc.getTime(),
                    dataCriacao: hoje.toLocaleDateString('pt-BR'),
                    venciFormat: venc.toLocaleDateString('pt-BR')
                });
                localStorage.setItem('van_vFinal', JSON.stringify(db));
                render();
            }
        }

        function render() {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            let soma = 0;
            db.forEach(i => {
                soma += i.baseCobrar;
                lista.innerHTML += `
                    <div class="cliente-card">
                        <div>
                            <b>${i.nome}</b><br>
                            <span style="font-size: 20px;">R$ ${i.baseCobrar.toFixed(2)}</span>
                        </div>
                        <button onclick="remover(${i.id})" style="padding: 10px; border-radius: 10px; border:none;">BAIXA</button>
                    </div>`;
            });
            document.getElementById('total-rua').innerText = "R$ " + soma.toFixed(2);
        }

        function remover(id) {
            db = db.filter(x => x.id !== id);
            localStorage.setItem('van_vFinal', JSON.stringify(db));
            render();
        }

        function limparMemoria() {
            if(confirm("Isso vai apagar todos os dados e resetar o PIN. Continuar?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>

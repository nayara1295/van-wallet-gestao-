<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira Pessoal Vanubia</title>
    <style>
        /* --- ESTILO BASE PREMIUM --- */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Times New Roman', Times, serif; /* Fonte mais clássica e elegante */
            background-color: #000; /* Fundo preto absoluto */
            background-image: radial-gradient(circle, #1a1a1a 0%, #000000 70%); /* Brilho central suave */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #d4af37; /* Dourado suave para textos gerais */
            overflow: hidden;
        }

        /* --- CONTAINER DE LOGIN ELEGANTE --- */
        .login-container {
            background: rgba(10, 10, 10, 0.9); /* Fundo escuro quase opaco */
            padding: 50px 40px;
            border-radius: 4px; /* Bordas menos arredondadas, mais sóbrias */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); /* Sombra profunda */
            border: 1px solid #aa8528; /* Borda dourada fina e envelhecida */
            width: 320px;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); /* Animação suave */
            opacity: 0; /* Começa invisível para o efeito de entrada */
            transform: translateY(20px);
        }
        
        /* Classe para mostrar o container com animação ao carregar a página */
        .login-container.carregado {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- LOGO DOURADA PRESTÍGIO --- */
        .logo {
            font-size: 32px;
            font-weight: 300; /* Mais fina para elegância */
            text-transform: uppercase;
            letter-spacing: 4px; /* Espaçamento chique */
            margin-bottom: 40px;
            color: #d4af37; /* Dourado metálico */
            /* Brilho sofisticado, não neon */
            text-shadow: 0px 2px 4px rgba(170, 133, 40, 0.5); 
        }

        /* --- ESTILO DO CAMPO DE SENHA --- */
        .input-group {
            margin-bottom: 25px;
            text-align: center; /* Centralizar label e input */
        }
        
        /* Label 'Senha Pessoal' */
        .input-group label { 
            display: block; 
            margin-bottom: 10px; 
            color: #aa8528; 
            font-size: 14px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* Campo de Input */
        .input-group input {
            width: 80%; /* Não ocupa tudo, fica mais centralizado */
            padding: 15px; 
            background-color: #0a0a0a;
            border: none;
            border-bottom: 1px solid #444; /* Apenas linha inferior para visual limpo */
            color: #fff; 
            font-size: 20px; /* Senha maior */
            text-align: center; /* Centralizar os pontos da senha */
            letter-spacing: 5px; /* Espaçamento nos pontos da senha */
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }
        
        /* Efeito ao clicar: a linha fica dourada */
        .input-group input:focus { 
            outline: none; 
            border-bottom: 1px solid #d4af37;
        }

        /* --- ESTILO DO BOTÃO ACESSAR --- */
        .btn-gold {
            width: 80%; 
            padding: 15px;
            background: none; /* Sem fundo colorido */
            border: 1px solid #d4af37; /* Borda dourada */
            color: #d4af37; 
            border-radius: 2px;
            font-size: 16px; 
            font-weight: 300; 
            cursor: pointer;
            transition: all 0.4s ease; 
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        /* Efeito ao passar o mouse: preenche com dourado */
        .btn-gold:hover { 
            background-color: #d4af37;
            color: #000;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

    </style>
</head>
<body>

    <div class="login-container" id="containerPrincipal">
        <div class="logo">
            Vanubia<br>
            <span style="font-size: 16px; letter-spacing: 2px; color: #aa8528;">Carteira Pessoal</span>
        </div>

        <form id="loginForm" action="#" method="post" onsubmit="verificarSenha(event)">
            
            <div class="input-group">
                <label for="senha">Senha de Acesso</label>
                <input type="password" id="senha" name="senha" placeholder="••••" required maxlength="4">
            </div>

            <button type="submit" class="btn-gold">Acessar</button>
        </form>

    </div>

    <script>
        // Animação de entrada ao carregar a página
        window.onload = function() {
            document.getElementById('containerPrincipal').classList.add('carregado');
            document.getElementById('senha').focus(); // Já foca no campo de senha
        }

        // ITEM: VALIDAÇÃO DA SENHA DEFINIDA (9656)
        function verificarSenha(event) {
            event.preventDefault(); // Impede o formulário de recarregar a página

            const senhaDigitada = document.getElementById('senha').value;
            const SENHA_CORRETA = "9656"; // Sua senha definida

            if (senhaDigitada === SENHA_CORRETA) {
                // Efeito simples de sucesso antes de entrar
                document.getElementById('containerPrincipal').style.borderColor = "#00ff00";
                document.getElementById('containerPrincipal').style.boxShadow = "0 0 20px rgba(0, 255, 0, 0.3)";
                
                setTimeout(() => {
                    alert("Acesso Autorizado. Bem-vinda!");
                    // Próximo passo: Redirecionar para a tela de empréstimos
                }, 500);

            } else {
                // Efeito de erro (piscar vermelho)
                const container = document.getElementById('containerPrincipal');
                container.style.borderColor = "#ff0000";
                container.style.boxShadow = "0 0 20px rgba(255, 0, 0, 0.3)";
                
                alert("Senha Incorreta.");
                
                // Reseta a cor após o alerta
                setTimeout(() => {
                    container.style.borderColor = "#aa8528";
                    container.style.boxShadow = "0 10px 30px rgba(0, 0, 0, 0.8)";
                    document.getElementById('senha').value = ''; 
                    document.getElementById('senha').focus();
                }, 200);
            }
        }
    </script>

</body>
</html>
            } else {
                alert("Senha Incorreta. Tente novamente.");
                document.getElementById('senha').value = ''; // Limpa o campo
                document.getElementById('senha').focus(); // Coloca o cursor de volta
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAN WALLET - V3.1</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; font-family: 'Inter', sans-serif; color: #fff; overflow-x: hidden; }
        #tela-login { position: fixed; inset: 0; background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .logo-login { letter-spacing: 5px; color: #d4af37; font-size: 32px; font-weight: 900; margin-bottom: 30px; }
        
        /* PIN SEM RASTROS DO GITHUB */
        .pin-input-limpo { 
            padding: 20px; width: 180px; border-radius: 20px; border: 2px solid #d4af37; 
            background: #111; color: #d4af37; font-size: 35px; text-align: center; 
            outline: none; margin-bottom: 20px; letter-spacing: 12px; display: block;
            -webkit-text-security: disc;
        }
        .pin-erro { border-color: #ff4d4d !important; animation: shake 0.3s; }

        /* AVISO DE ERRO ESTILIZADO (SUBSTITUI O ALERT) */
        #aviso-erro {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #ff4d4d; color: #000; padding: 15px 30px; border-radius: 12px;
            font-weight: 900; z-index: 11000; box-shadow: 0 10px 30px rgba(255,77,77,0.4);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .btn-gold { padding: 18px; width: 280px; background: #fff; color: #000; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #conteudo-privado { display: none; padding: 20px; max-width: 450px; margin: 0 auto; padding-bottom: 100px; }
        .card-total { background: linear-gradient(145deg, #151515, #050505); padding: 30px; border-radius: 25px; border: 1px solid #222; text-align: center; margin: 20px 0; border-bottom: 3px solid #d4af37; }
        .input-cadastro { padding: 18px; width: 85%; border-radius: 12px; border: 2px solid #d4af37; background: #1a1a1a; color: #fff !important; font-size: 20px; text-align: center; outline: none; margin: 15px auto; display: block; }
        .cliente-card { border-radius: 22px; margin-bottom: 15px; padding: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .card-ok { background: linear-gradient(145deg, #0a180a, #040804); border-color: #1e3a1e; }
        .card-hoje { background: linear-gradient(145deg, #2a2006, #110d02); border-color: #d4af37; }
        .card-atraso { background: linear-gradient(145deg, #2a0a0a, #110404); border-color: #ff4d4d; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .step { display: none; text-align: center; width: 100%; }
        .step.active { display: block; }
        .btn-prazo { background: transparent; border: 2px solid #333; color: #666; padding: 12px; width: 75px; border-radius: 12px; margin: 4px; font-weight: 700; cursor: pointer; }
        .btn-prazo.selecionado { border-color: #d4af37; color: #d4af37; background: rgba(212,175,55,0.1); }
        .acoes-btn { display: flex; flex-direction: column; gap: 6px; min-width: 90px; }
        .baixa-btn { background: #00ff00; color: #000; border: none; padding: 9px; border-radius: 10px; font-size: 11px; font-weight: 900; }
        .edit-btn { background: #fff; color: #000; border: none; padding: 9px; border-radius: 10px; font-size: 11px; font-weight: 900; }
        .info-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #333; padding: 9px; border-radius: 10px; font-size: 11px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="aviso-erro">PIN INCORRETO!</div>

    <div id="tela-login">
        <div class="logo-login">VAN WALLET</div>
        <input type="text" id="pin" class="pin-input-limpo" placeholder="••••" maxlength="4" inputmode="numeric" autocomplete="off" oninput="validarEntrada(this.value)">
        <button class="btn-gold" onclick="tentarLoginDireto()">ACESSAR CONTA</button>
    </div>

    <div id="conteudo-privado">
        <div class="card-total">
            <small style="color: #666; letter-spacing: 2px; font-weight: bold;">TOTAL A RECEBER</small>
            <h1 id="total-rua" style="font-size: 45px; margin: 10px 0; color:#d4af37">R$ 0,00</h1>
        </div>
        <button class="btn-gold" style="width: 100%; border-radius: 20px;" onclick="abrirCadastro()">+ NOVO EMPRÉSTIMO</button>
        <div id="lista-clientes" style="margin-top: 35px;"></div>
    </div>

    <div id="modal-editar" class="modal-overlay">
        <div class="card-total" style="width: 85%; max-width: 380px; border-color: #fff;">
            <h2 style="color:#fff; margin-top:0;">Editar Dados</h2>
            <input type="text" id="edit-nome" class="input-cadastro" autocomplete="off">
            <input type="number" id="edit-valor-total" class="input-cadastro" style="color:#00ff00 !important;">
            <p style="color:#d4af37; font-size:12px; margin-bottom:5px;">PIN PARA SALVAR:</p>
            <input type="text" id="pin-editar" class="pin-input-limpo" style="width: 100px; padding: 10px; font-size: 20px; letter-spacing: 5px; margin: 0 auto 15px auto;" maxlength="4" inputmode="numeric" autocomplete="off">
            <div style="display: flex; gap: 10px;">
                <button class="btn-prazo" style="width: 50%; margin:0;" onclick="fecharModal('modal-editar')">VOLTAR</button>
                <button class="btn-gold" id="btn-salvar-edit" style="width: 50%; background:#fff; color:#000; margin:0;">SALVAR</button>
            </div>
        </div>
    </div>

    <div id="modal-confirma" class="modal-overlay">
        <div class="card-total" style="width: 85%; max-width: 380px; border-color: #00ff00;">
            <h2 style="color:#00ff00; margin-top:0;">Finalizar</h2>
            <input type="text" id="pin-baixa" class="pin-input-limpo" style="width: 120px; font-size: 28px;" maxlength="4" inputmode="numeric" autocomplete="off">
            <div style="display: flex; gap: 10px;">
                <button class="btn-prazo" style="width: 50%; margin:0;" onclick="fecharModal('modal-confirma')">CANCELAR</button>
                <button class="btn-gold" id="confirmar-baixa-btn" style="width: 50%; background:#00ff00; margin:0;">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <script>
        const PIN_SISTEMA = "9656";
        let db = JSON.parse(localStorage.getItem('van_vFinal')) || [];

        // FUNÇÃO QUE MOSTRA O ERRO SEM O GITHUB
        function mostrarErro() {
            const aviso = document.getElementById('aviso-erro');
            aviso.style.display = 'block';
            setTimeout(() => { aviso.style.display = 'none'; }, 2000);
            
            // Faz o campo vibrar e ficar vermelho
            const pins = ['pin', 'pin-editar', 'pin-baixa'];
            pins.forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.classList.add('pin-erro');
                    el.value = "";
                    setTimeout(() => el.classList.remove('pin-erro'), 500);
                }
            });
        }

        function validarEntrada(v) { 
            if(v.length === 4) { 
                if(v === PIN_SISTEMA) executarLogin(); 
                else mostrarErro(); 
            } 
        }

        function tentarLoginDireto() { 
            if(document.getElementById('pin').value === PIN_SISTEMA) executarLogin(); 
            else mostrarErro(); 
        }

        function executarLogin() { 
            document.getElementById('tela-login').style.display = 'none'; 
            document.getElementById('conteudo-privado').style.display = 'block'; 
            render(); 
        }

        // ... Restante das funções (render, abrirEditar, fecharModal, etc) ...
        // [Mantive a lógica interna para o código não ficar gigante, mas apliquei o mostrarErro() em tudo]

        function abrirEditar(id) {
            const i = db.find(item => item.id === id);
            document.getElementById('edit-nome').value = i.nome;
            document.getElementById('edit-valor-total').value = i.baseCobrar;
            document.getElementById('pin-editar').value = "";
            document.getElementById('modal-editar').style.display = 'flex';
            document.getElementById('btn-salvar-edit').onclick = function() {
                if(document.getElementById('pin-editar').value === PIN_SISTEMA) {
                    i.nome = document.getElementById('edit-nome').value;
                    i.baseCobrar = parseFloat(document.getElementById('edit-valor-total').value);
                    localStorage.setItem('van_vFinal', JSON.stringify(db));
                    fecharModal('modal-editar'); render();
                } else { mostrarErro(); }
            };
        }

        function abrirConfirmaBaixa(id) {
            document.getElementById('pin-baixa').value = "";
            document.getElementById('modal-confirma').style.display = 'flex';
            document.getElementById('confirmar-baixa-btn').onclick = function() {
                if(document.getElementById('pin-baixa').value === PIN_SISTEMA) {
                    db = db.filter(c => c.id !== id);
                    localStorage.setItem('van_vFinal', JSON.stringify(db));
                    fecharModal('modal-confirma'); render();
                } else { mostrarErro(); }
            };
        }

        function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

        function render() {
            const lista = document.getElementById('lista-clientes'); lista.innerHTML = "";
            let somaTotal = 0; const hojeTs = new Date().setHours(0,0,0,0);
            db.sort((a, b) => a.venci - b.venci);
            db.forEach(i => {
                const diff = Math.ceil((i.venci - hojeTs) / (1000*60*60*24));
                let valorFinal = i.baseCobrar;
                let classe = "card-ok", st = `Vence em ${diff}d`;
                if(diff === 0) { classe = "card-hoje"; st = "HOJE"; }
                else if(diff < 0) { valorFinal = i.baseCobrar + (Math.abs(diff)*40); classe = "card-atraso"; st = `ATRASADO ${Math.abs(diff)}D`; }
                somaTotal += valorFinal;
                lista.innerHTML += `
                    <div class="cliente-card ${classe}">
                        <div><span style="font-weight:600;">${i.nome}</span><br>
                        <span style="font-size:24px; font-weight:900;">R$ ${valorFinal.toFixed(2)}</span><br>
                        <small style="font-weight:bold;">${st}</small></div>
                        <div class="acoes-btn">
                            <button class="baixa-btn" onclick="abrirConfirmaBaixa(${i.id})">BAIXAR</button>
                            <button class="edit-btn" onclick="abrirEditar(${i.id})">EDITAR</button>
                        </div>
                    </div>`;
            });
            document.getElementById('total-rua').innerText = "R$ " + somaTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van Wallet - Private Banking</title>
    <style>
        /* ESTILO DARK PREMIUM */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; font-family: 'Inter', sans-serif; color: #e0e0e0;
        }
        
        #tela-login {
            position: fixed; width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            background: #000; z-index: 1000; text-align: center;
        }

        .logo-svg { width: 80px; height: 80px; margin-bottom: 20px; }
        h1 { font-size: 22px; letter-spacing: 3px; color: #fff; margin: 0; }
        
        #campo-senha { 
            padding: 18px; width: 250px; font-size: 22px; text-align: center; 
            border-radius: 12px; border: 1px solid #222; background: #080808; color: #d4af37;
            margin: 30px 0 15px; letter-spacing: 10px; outline: none;
        }

        .btn-acessar {
            padding: 16px; width: 250px; background: #fff; color: #000; border: none;
            border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
        }

        #conteudo-privado { 
            display: none; padding: 20px; max-width: 500px; margin: 0 auto;
        }

        .card-topo {
            background: linear-gradient(145deg, #0f0f0f, #050505);
            padding: 25px; border-radius: 20px; border: 1px solid #1a1a1a;
            margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
        .valor-principal { font-size: 36px; font-weight: 700; color: #fff; margin: 10px 0; }
        
        .status-em-dia { border-left: 6px solid #2ecc71 !important; }
        .status-vence-hoje { border-left: 6px solid #f1c40f !important; }
        .status-vencido { border-left: 6px solid #e74c3c !important; }

        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-verde { background: #2ecc71; }
        .dot-amarelo { background: #f1c40f; }
        .dot-vermelho { background: #e74c3c; }

        .input-step {
            width: 100%; padding: 18px; border-radius: 12px; border: 1px solid #222; 
            background: #080808; color: #fff; font-size: 16px; outline: none; box-sizing: border-box;
        }

        .btn-prazo {
            flex: 1; padding: 20px; background: #111; color: #d4af37; border: 1px solid #333;
            border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer;
        }
        
        .btn-delete {
            position: absolute; top: 15px; right: 15px; background: none; border: none; color: #444; cursor: pointer; font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="logo-svg">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 85L20 50H35V15H65V50H80L50 85Z" stroke="#d4af37" stroke-width="4" stroke-linejoin="round"/>
                <circle cx="50" cy="50" r="10" stroke="#d4af37" stroke-width="3" />
            </svg>
        </div>
        <h1>VAN WALLET</h1>
        <input type="password" id="campo-senha" placeholder="••••••" maxlength="6">
        <button class="btn-acessar" onclick="fazerLogin()">CONECTAR</button>
        <p id="mensagem-erro" style="color: #ff4d4d; font-size: 12px; margin-top: 15px;"></p>
    </div>

    <div id="conteudo-privado">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span style="color: #d4af37; font-weight: 600; font-size: 12px;">PRIVATE BANKING</span>
            <button onclick="logout()" style="background:none; border:none; color:#666; cursor:pointer;">Sair</button>
        </div>

        <div class="card-topo">
            <div class="label">Dinheiro na Rua (Total)</div>
            <div class="valor-principal" id="display-total">R$ 0,00</div>
            <div style="color: #d4af37; font-size: 14px;">↑ Incluindo Juros de Atraso</div>
        </div>

        <div class="card-topo" id="card-cadastro" style="border-style: dashed; border-color: #333;">
            <div class="label" id="titulo-etapa" style="margin-bottom: 20px; text-align: center;">NOVO REGISTRO (1/3)</div>

            <div id="etapa-nome">
                <input type="text" id="nome-cliente" class="input-step" placeholder="Nome do Cliente">
                <button class="btn-acessar" style="width: 100%; margin-top: 20px; background: #d4af37; color: #000; font-weight: 700; height: 55px;" onclick="irParaValor()">AVANÇAR</button>
            </div>

            <div id="etapa-valor" style="display: none;">
                <input type="number" id="valor-emprestimo" class="input-step" placeholder="Valor R$" style="color: #d4af37; font-size: 22px; text-align: center;">
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button onclick="voltarParaNome()" style="flex: 1; background: none; border: 1px solid #333; color: #666; border-radius: 12px; cursor: pointer;">Voltar</button>
                    <button class="btn-acessar" style="flex: 2; background: #fff; color: #000; font-weight: 700; height: 55px;" onclick="irParaPrazo()">AVANÇAR</button>
                </div>
            </div>

            <div id="etapa-prazo" style="display: none;">
                <div class="label" style="text-align: center; margin-bottom: 15px;">Escolha o Prazo (Dias)</div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-prazo" onclick="finalizarComPrazo(7)">7</button>
                    <button class="btn-prazo" onclick="finalizarComPrazo(15)">15</button>
                    <button class="btn-prazo" onclick="finalizarComPrazo(30)">30</button>
                </div>
                <button onclick="voltarParaValor()" style="width: 100%; background: none; border: none; color: #444; margin-top: 20px; cursor: pointer; font-size: 11px;">← Corrigir Valor</button>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <div class="label">Contratos Ativos</div>
            <div id="lista-clientes" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script>
        const SENHA_MESTRE = "102030";
        const MULTA_DIARIA = 40.00; // Valor da multa por dia de atraso
        let clientes = JSON.parse(localStorage.getItem('clientes_van_wallet')) || [];

        window.onload = function() {
            if(sessionStorage.getItem('logado') === 'true') {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                renderizarLista();
            }
        };

        function fazerLogin() {
            const senha = document.getElementById('campo-senha').value;
            if (senha === SENHA_MESTRE) {
                sessionStorage.setItem('logado', 'true');
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                renderizarLista();
            } else {
                document.getElementById('mensagem-erro').innerText = "PIN INCORRETO";
            }
        }

        function logout() { sessionStorage.removeItem('logado'); location.reload(); }

        function irParaValor() {
            if(!document.getElementById('nome-cliente').value) return;
            document.getElementById('etapa-nome').style.display = 'none';
            document.getElementById('etapa-valor').style.display = 'block';
            document.getElementById('titulo-etapa').innerText = "VALOR DO EMPRÉSTIMO (2/3)";
        }

        function voltarParaNome() {
            document.getElementById('etapa-valor').style.display = 'none';
            document.getElementById('etapa-nome').style.display = 'block';
            document.getElementById('titulo-etapa').innerText = "NOVO REGISTRO (1/3)";
        }

        function irParaPrazo() {
            if(!document.getElementById('valor-emprestimo').value) return;
            document.getElementById('etapa-valor').style.display = 'none';
            document.getElementById('etapa-prazo').style.display = 'block';
            document.getElementById('titulo-etapa').innerText = "PRAZO DE PAGAMENTO (3/3)";
        }

        function voltarParaValor() {
            document.getElementById('etapa-prazo').style.display = 'none';
            document.getElementById('etapa-valor').style.display = 'block';
            document.getElementById('titulo-etapa').innerText = "VALOR DO EMPRÉSTIMO (2/3)";
        }

        function finalizarComPrazo(dias) {
            const nome = document.getElementById('nome-cliente').value;
            const valor = parseFloat(document.getElementById('valor-emprestimo').value);
            const retorno = valor * 1.40;
            
            let dataVenc = new Date();
            dataVenc.setHours(0,0,0,0);
            dataVenc.setDate(dataVenc.getDate() + dias);

            const novoCliente = {
                id: Date.now(),
                nome: nome.toUpperCase(),
                valorOriginal: valor,
                valorRetornoBase: retorno,
                dataVencimento: dataVenc.getTime(),
                diasPrazo: dias
            };

            clientes.push(novoCliente);
            localStorage.setItem('clientes_van_wallet', JSON.stringify(clientes));
            
            document.getElementById('nome-cliente').value = "";
            document.getElementById('valor-emprestimo').value = "";
            voltarParaNome();
            document.getElementById('etapa-prazo').style.display = 'none';
            
            renderizarLista();
        }

        function renderizarLista() {
            const lista = document.getElementById('lista-clientes');
            const displayTotal = document.getElementById('display-total');
            lista.innerHTML = '';
            let totalGeralComJuros = 0;

            if(clientes.length === 0) {
                lista.innerHTML = '<p style="color: #444; text-align: center; margin-top: 20px; font-size: 13px;">Nenhum cliente cadastrado ainda.</p>';
                displayTotal.innerText = "R$ 0,00";
                return;
            }

            let hoje = new Date();
            hoje.setHours(0,0,0,0);

            clientes.forEach((c) => {
                let dataV = new Date(c.dataVencimento);
                dataV.setHours(0,0,0,0);

                // Cálculo de Juros de Vencimento (R$ 40 por dia)
                let jurosAtraso = 0;
                if (hoje > dataV) {
                    const diffTempo = Math.abs(hoje - dataV);
                    const diffDias = Math.ceil(diffTempo / (1000 * 60 * 60 * 24));
                    jurosAtraso = diffDias * MULTA_DIARIA;
                }

                let valorFinalCobrado = c.valorRetornoBase + jurosAtraso;
                totalGeralComJuros += valorFinalCobrado;

                let statusC = "status-em-dia"; let statusT = "Em dia"; let dot = "dot-verde";
                if (dataV.getTime() === hoje.getTime()) { statusC = "status-vence-hoje"; statusT = "Vence Hoje"; dot = "dot-amarelo"; }
                else if (hoje > dataV) { statusC = "status-vencido"; statusT = "Vencido"; dot = "dot-vermelho"; }

                const item = document.createElement('div');
                item.className = `card-topo ${statusC}`;
                item.innerHTML = `
                    <button class="btn-delete" onclick="removerCliente(${c.id})">✕</button>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="color:#fff; font-weight:bold; letter-spacing:1px;">${c.nome}</span>
                        <span style="color:#d4af37; font-size: 18px; font-weight: 700;">R$ ${valorFinalCobrado.toLocaleString('pt-br', {minimumFractionDigits: 2})}</span>
                    </div>
                    <div style="font-size: 11px; color: #888; margin-top: 10px; line-height: 1.6;">
                        <div><span class="dot ${dot}"></span>${statusT}: ${dataV.toLocaleDateString('pt-br')}</div>
                        <div style="display: flex; justify-content: space-between; color: #444;">
                            <span>Investido: R$ ${c.valorOriginal.toFixed(2)}</span>
                            ${jurosAtraso > 0 ? `<span style="color: #e74c3c;">Juros de Vencimento: R$ ${jurosAtraso.toFixed(2)}</span>` : ''}
                        </div>
                    </div>
                `;
                lista.prepend(item);
            });

            displayTotal.innerText = `R$ ${totalGeralComJuros.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
        }

        function removerCliente(id) {
            if(confirm("Deseja confirmar o pagamento/exclusão?")) {
                clientes = clientes.filter(c => c.id !== id);
                localStorage.setItem('clientes_van_wallet', JSON.stringify(clientes));
                renderizarLista();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van Wallet - Private Banking</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Inter', sans-serif; color: #e0e0e0; }
        #tela-login { position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 1000; text-align: center; }
        .logo-svg { width: 80px; height: 80px; margin-bottom: 20px; }
        h1 { font-size: 22px; letter-spacing: 3px; color: #fff; margin: 0; }
        #campo-senha { padding: 18px; width: 250px; font-size: 22px; text-align: center; border-radius: 12px; border: 1px solid #222; background: #080808; color: #d4af37; margin: 30px 0 15px; letter-spacing: 10px; outline: none; }
        .btn-acessar { padding: 16px; width: 250px; background: #fff; color: #000; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
        #conteudo-privado { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
        .card-topo { background: linear-gradient(145deg, #0f0f0f, #050505); padding: 25px; border-radius: 20px; border: 1px solid #1a1a1a; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
        .valor-principal { font-size: 36px; font-weight: 700; color: #fff; margin: 10px 0; }
        .status-em-dia { border-left: 6px solid #2ecc71 !important; }
        .status-vence-hoje { border-left: 6px solid #f1c40f !important; }
        .status-vencido { border-left: 6px solid #e74c3c !important; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-verde { background: #2ecc71; }
        .dot-amarelo { background: #f1c40f; }
        .dot-vermelho { background: #e74c3c; }
        .input-step { width: 100%; padding: 18px; border-radius: 12px; border: 1px solid #222; background: #080808; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn-prazo { flex: 1; padding: 20px; background: #111; color: #d4af37; border: 1px solid #333; border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer; }
        .btn-outro { background: #1a1a1a; color: #888; border: 1px solid #333; border-radius: 10px; padding: 10px; font-size: 12px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }
        .btn-delete { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #444; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="logo-svg">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 85L20 50H35V15H65V50H80L50 85Z" stroke="#d4af37" stroke-width="4" stroke-linejoin="round"/>
                <circle cx="50" cy="50" r="10" stroke="#d4af37" stroke-width="3" />
            </svg>
        </div>
        <h1>VAN WALLET</h1>
        <input type="password" id="campo-senha" placeholder="••••••" maxlength="6">
        <button class="btn-acessar" onclick="fazerLogin()">CONECTAR</button>
        <p id="mensagem-erro" style="color: #ff4d4d; font-size: 12px; margin-top: 15px;"></p>
    </div>

    <div id="conteudo-privado">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span style="color: #d4af37; font-weight: 600; font-size: 12px;">PRIVATE BANKING</span>
            <button onclick="logout()" style="background:none; border:none; color:#666; cursor:pointer;">Sair</button>
        </div>

        <div class="card-topo">
            <div class="label">Dinheiro na Rua (Total)</div>
            <div class="valor-principal" id="display-total">R$ 0,00</div>
            <div style="color: #d4af37; font-size: 14px;">↑ Incluindo Juros de Atraso (R$ 40/dia)</div>
        </div>

        <div class="card-topo" id="card-cadastro" style="border-style: dashed; border-color: #333;">
            <div class="label" id="titulo-etapa" style="margin-bottom: 20px; text-align: center;">NOVO REGISTRO</div>

            <div id="etapa-nome">
                <input type="text" id="nome-cliente" class="input-step" placeholder="Nome do Cliente">
                <button class="btn-acessar" style="width: 100%; margin-top: 20px; background: #d4af37; color: #000;" onclick="irParaValor()">AVANÇAR</button>
            </div>

            <div id="etapa-valor" style="display: none;">
                <input type="number" id="valor-emprestimo" class="input-step" placeholder="Valor R$" style="color: #d4af37; font-size: 22px; text-align: center;">
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button onclick="voltarParaNome()" style="flex: 1; background: none; border: 1px solid #333; color: #666; border-radius: 12px;">Voltar</button>
                    <button class="btn-acessar" style="flex: 2; background: #fff; color: #000;" onclick="irParaPrazo()">AVANÇAR</button>
                </div>
            </div>

            <div id="etapa-prazo" style="display: none;">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-prazo" onclick="finalizarComPrazo(7)">7 D</button>
                    <button class="btn-prazo" onclick="finalizarComPrazo(15)">15 D</button>
                    <button class="btn-prazo" onclick="finalizarComPrazo(30)">30 D</button>
                </div>
                <button class="btn-outro" onclick="abrirDataManual()">OUTRO (DATA ANTIGA)</button>
            </div>

            <div id="etapa-data-manual" style="display: none;">
                <input type="date" id="data-emprestimo" class="input-step" style="margin-bottom: 10px;">
                <div style="display: flex; gap: 5px;">
                    <button class="btn-prazo" onclick="finalizarComDataEIntervalo(7)">7D</button>
                    <button class="btn-prazo" onclick="finalizarComDataEIntervalo(15)">15D</button>
                    <button class="btn-prazo" onclick="finalizarComDataEIntervalo(30)">30D</button>
                </div>
                <button onclick="voltarParaPrazo()" style="width:100%; background:none; border:none; color:#444; margin-top:10px;">Voltar</button>
            </div>
        </div>

        <div id="lista-clientes" style="margin-top: 30px;"></div>
    </div>

    <script>
        const SENHA_MESTRE = "102030";
        const MULTA_DIARIA = 40.00;
        let clientes = JSON.parse(localStorage.getItem('clientes_van_wallet')) || [];

        function formatarDataLocal(dataStr) {
            let p = dataStr.split('-');
            return new Date(p[0], p[1]-1, p[2], 0, 0, 0);
        }

        window.onload = function() {
            if(sessionStorage.getItem('logado') === 'true') {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                renderizarLista();
            }
        };

        function fazerLogin() {
            if (document.getElementById('campo-senha').value === SENHA_MESTRE) {
                sessionStorage.setItem('logado', 'true');
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                renderizarLista();
            } else { document.getElementById('mensagem-erro').innerText = "PIN INCORRETO"; }
        }

        function logout() { sessionStorage.removeItem('logado'); location.reload(); }

        function irParaValor() { if(document.getElementById('nome-cliente').value) { document.getElementById('etapa-nome').style.display = 'none'; document.getElementById('etapa-valor').style.display = 'block'; } }
        function voltarParaNome() { document.getElementById('etapa-valor').style.display = 'none'; document.getElementById('etapa-nome').style.display = 'block'; }
        function irParaPrazo() { if(document.getElementById('valor-emprestimo').value) { document.getElementById('etapa-valor').style.display = 'none'; document.getElementById('etapa-prazo').style.display = 'block'; } }
        function voltarParaPrazo() { document.getElementById('etapa-data-manual').style.display = 'none'; document.getElementById('etapa-prazo').style.display = 'block'; }
        function abrirDataManual() { document.getElementById('etapa-prazo').style.display = 'none'; document.getElementById('etapa-data-manual').style.display = 'block'; }

        function finalizarComPrazo(dias) {
            let hoje = new Date(); hoje.setHours(0,0,0,0);
            let venc = new Date(hoje); venc.setDate(venc.getDate() + dias);
            salvar(hoje.getTime(), venc.getTime());
        }

        function finalizarComDataEIntervalo(dias) {
            let dataInput = document.getElementById('data-emprestimo').value;
            if(!dataInput) return alert("Selecione a data!");
            let emp = formatarDataLocal(dataInput);
            let venc = new Date(emp); venc.setDate(venc.getDate() + dias);
            salvar(emp.getTime(), venc.getTime());
        }

        function salvar(tsEmp, tsVenc) {
            let nome = document.getElementById('nome-cliente').value;
            let valor = parseFloat(document.getElementById('valor-emprestimo').value);
            
            let novo = { 
                id: Date.now(), 
                nome: nome.toUpperCase(), 
                valorOriginal: valor, 
                valorRetornoBase: valor * 1.40, 
                dataEmprestimo: tsEmp, 
                dataVencimento: tsVenc 
            };
            
            clientes.push(novo);
            localStorage.setItem('clientes_van_wallet', JSON.stringify(clientes));
            
            // RESET DA TELA
            document.getElementById('nome-cliente').value = "";
            document.getElementById('valor-emprestimo').value = "";
            document.getElementById('etapa-data-manual').style.display = 'none';
            document.getElementById('etapa-prazo').style.display = 'none';
            document.getElementById('etapa-valor').style.display = 'none';
            document.getElementById('etapa-nome').style.display = 'block';
            
            renderizarLista();
        }

        function renderizarLista() {
            let lista = document.getElementById('lista-clientes');
            let displayTotal = document.getElementById('display-total');
            lista.innerHTML = ''; let totalGeral = 0;
            let hoje = new Date(); hoje.setHours(0,0,0,0);

            clientes.forEach((c) => {
                let dVenc = new Date(c.dataVencimento);
                let dEmp = new Date(c.dataEmprestimo);
                let juros = 0;
                if (hoje > dVenc) {
                    let diff = Math.floor((hoje - dVenc) / (1000 * 60 * 60 * 24));
                    juros = diff * MULTA_DIARIA;
                }
                let totalC = c.valorRetornoBase + juros;
                totalGeral += totalC;
                
                let cor = "status-em-dia"; let pto = "dot-verde";
                if (dVenc.getTime() === hoje.getTime()) { cor = "status-vence-hoje"; pto = "dot-amarelo"; }
                else if (hoje > dVenc) { cor = "status-vencido"; pto = "dot-vermelho"; }

                lista.innerHTML += `
                    <div class="card-topo ${cor}">
                        <button class="btn-delete" onclick="remover(${c.id})">✕</button>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-weight:bold;">${c.nome}</span>
                            <span style="color:#d4af37; font-size:20px; font-weight:700;">R$ ${totalC.toFixed(2)}</span>
                        </div>
                        <div style="font-size:11px; color:#888; margin-top:10px;">
                            <div><span class="dot ${pto}"></span>Emprestado: ${dEmp.toLocaleDateString('pt-br')}</div>
                            <div style="display:flex; justify-content:space-between; margin-top:5px;">
                                <span>Investido: R$ ${c.valorOriginal.toFixed(2)}</span>
                                ${juros > 0 ? `<span style="color:#e74c3c; font-weight:bold;">Multa: R$ ${juros.toFixed(2)}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            displayTotal.innerText = `R$ ${totalGeral.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
        }

        function remover(id) { if(confirm("Confirmar exclusão?")) { clientes = clientes.filter(c => c.id !== id); localStorage.setItem('clientes_van_wallet', JSON.stringify(clientes)); renderizarLista(); } }
    </script>
</body>
</html>

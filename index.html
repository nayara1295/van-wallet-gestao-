<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van Wallet - Private Banking</title>
    <style>
        /* ESTILO DARK PREMIUM */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; font-family: 'Inter', sans-serif; color: #e0e0e0;
        }
        
        /* TELA DE LOGIN */
        #tela-login {
            position: fixed; width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            background: #000; z-index: 1000; text-align: center;
        }

        .logo-svg { width: 80px; height: 80px; margin-bottom: 20px; }
        h1 { font-size: 22px; letter-spacing: 3px; color: #fff; margin: 0; }
        
        #campo-senha { 
            padding: 18px; width: 250px; font-size: 22px; text-align: center; 
            border-radius: 12px; border: 1px solid #222; background: #080808; color: #d4af37;
            margin: 30px 0 15px; letter-spacing: 10px; outline: none;
        }

        .btn-acessar {
            padding: 16px; width: 250px; background: #fff; color: #000; border: none;
            border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
        }

        /* DASHBOARD */
        #conteudo-privado { 
            display: none; padding: 20px; max-width: 500px; margin: 0 auto;
        }

        .card-topo {
            background: linear-gradient(145deg, #0f0f0f, #050505);
            padding: 25px; border-radius: 20px; border: 1px solid #1a1a1a;
            margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
        .valor-principal { font-size: 36px; font-weight: 700; color: #fff; margin: 10px 0; }
        .juros-detalhe { color: #d4af37; font-size: 14px; }

        /* INPUTS E BOTÕES DE ETAPAS */
        .input-step {
            width: 100%; padding: 18px; border-radius: 12px; border: 1px solid #222; 
            background: #080808; color: #fff; font-size: 16px; outline: none; box-sizing: border-box;
        }

        .btn-prazo {
            flex: 1; padding: 20px; background: #111; color: #d4af37; border: 1px solid #333;
            border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-prazo:active { background: #d4af37; color: #000; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="logo-svg">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 85L20 50H35V15H65V50H80L50 85Z" stroke="#d4af37" stroke-width="4" stroke-linejoin="round"/>
                <circle cx="50" cy="50" r="10" stroke="#d4af37" stroke-width="3" />
            </svg>
        </div>
        <h1>VAN WALLET</h1>
        <input type="password" id="campo-senha" placeholder="••••••" maxlength="6">
        <button class="btn-acessar" onclick="fazerLogin()">CONECTAR</button>
        <p id="mensagem-erro" style="color: #ff4d4d; font-size: 12px; margin-top: 15px;"></p>
    </div>

    <div id="conteudo-privado">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span style="color: #d4af37; font-weight: 600; font-size: 12px;">PRIVATE BANKING</span>
            <button onclick="location.reload()" style="background:none; border:none; color:#666; cursor:pointer;">Sair</button>
        </div>

        <div class="card-topo">
            <div class="label">Dinheiro na Rua (Total)</div>
            <div class="valor-principal" id="display-total">R$ 0,00</div>
            <div class="juros-detalhe">↑ Rendendo juros hoje</div>
        </div>

        <div class="card-topo" id="card-cadastro" style="border-style: dashed; border-color: #333;">
            <div class="label" id="titulo-etapa" style="margin-bottom: 20px; text-align: center;">NOVO REGISTRO (1/3)</div>

            <div id="etapa-nome">
                <input type="text" id="nome-cliente" class="input-step" placeholder="Nome do Cliente">
                <button class="btn-acessar" style="width: 100%; margin-top: 20px; background: #d4af37; color: #000; font-weight: 700; height: 55px;" onclick="irParaValor()">
                    AVANÇAR
                </button>
            </div>

            <div id="etapa-valor" style="display: none;">
                <input type="number" id="valor-emprestimo" class="input-step" placeholder="Valor R$" style="color: #d4af37; font-size: 22px; text-align: center;">
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button onclick="voltarParaNome()" style="flex: 1; background: none; border: 1px solid #333; color: #666; border-radius: 12px; cursor: pointer;">Voltar</button>
                    <button class="btn-acessar" style="flex: 2; background: #fff; color: #000; font-weight: 700; height: 55px;" onclick="irParaPrazo()">
                        AVANÇAR
                    </button>
                </div>
            </div>

            <div id="etapa-prazo" style="display: none;">
                <div class="label" style="text-align: center; margin-bottom: 15px;">Escolha o Prazo (Dias)</div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-prazo" onclick="finalizarComPrazo(7)">7</button>
                    <button class="btn-prazo" onclick="finalizarComPrazo(15)">15</button>
                    <button class="btn-prazo" onclick="finalizarComPrazo(30)">30</button>
                </div>
                <button onclick="voltarParaValor()" style="width: 100%; background: none; border: none; color: #444; margin-top: 20px; cursor: pointer; font-size: 11px;">← Corrigir Valor</button>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <div class="label">Contratos Ativos</div>
            <div id="lista-clientes" style="margin-top: 15px;">
                <p style="color: #444; text-align: center; margin-top: 20px; font-size: 13px;">Nenhum cliente cadastrado ainda.</p>
            </div>
        </div>
    </div>

    <script>
        const SENHA_MESTRE = "102030";
        let dinheiroNaRua = 0;

        function fazerLogin() {
            const senha = document.getElementById('campo-senha').value;
            if (senha === SENHA_MESTRE) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
            } else {
                document.getElementById('mensagem-erro').innerText = "PIN INCORRETO";
                document.getElementById('campo-senha').value = "";
            }
        }

        // NAVEGAÇÃO
        function irParaValor() {
            if(!document.getElementById('nome-cliente').value) return;
            document.getElementById('etapa-nome').style.display = 'none';
            document.getElementById('etapa-valor').style.display = 'block';
            document.getElementById('titulo-etapa').innerText = "VALOR DO EMPRÉSTIMO (2/3)";
        }

        function voltarParaNome() {
            document.getElementById('etapa-valor').style.display = 'none';
            document.getElementById('etapa-nome').style.display = 'block';
            document.getElementById('titulo-etapa').innerText = "NOVO REGISTRO (1/3)";
        }

        function irParaPrazo() {
            if(!document.getElementById('valor-emprestimo').value) return;
            document.getElementById('etapa-valor').style.display = 'none';
            document.getElementById('etapa-prazo').style.display = 'block';
            document.getElementById('titulo-etapa').innerText = "PRAZO DE PAGAMENTO (3/3)";
        }

        function voltarParaValor() {
            document.getElementById('etapa-prazo').style.display = 'none';
            document.getElementById('etapa-valor').style.display = 'block';
            document.getElementById('titulo-etapa').innerText = "VALOR DO EMPRÉSTIMO (2/3)";
        }

        // FINALIZAÇÃO COM O PRAZO SELECIONADO
        function finalizarComPrazo(dias) {
            const nome = document.getElementById('nome-cliente').value;
            const valor = parseFloat(document.getElementById('valor-emprestimo').value);
            const retorno = valor * 1.40;

            // Calcula a data de vencimento automática
            let dataVencimento = new Date();
            dataVencimento.setDate(dataVencimento.getDate() + dias);
            const dataFormatada = dataVencimento.toLocaleDateString('pt-br');

            // Atualiza Saldo do Topo
            dinheiroNaRua += retorno;
            document.getElementById('display-total').innerText = `R$ ${dinheiroNaRua.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;

            // Adiciona na Lista
            const lista = document.getElementById('lista-clientes');
            if (lista.querySelector('p')) lista.innerHTML = '';

            const item = document.createElement('div');
            item.className = 'card-topo';
            item.style.marginTop = '10px';
            item.style.borderLeft = '4px solid #d4af37';
            item.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color:#fff; font-weight:bold; letter-spacing:1px;">${nome.toUpperCase()}</span>
                    <span style="color:#d4af37; font-size: 18px; font-weight: 700;">R$ ${retorno.toLocaleString('pt-br', {minimumFractionDigits: 2})}</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-top: 8px;">
                    <span>Vence: ${dataFormatada} (${dias} dias)</span>
                    <span style="color: #444;">Investido: R$ ${valor.toFixed(2)}</span>
                </div>
            `;
            lista.prepend(item);

            // Reseta para o início
            document.getElementById('nome-cliente').value = "";
            document.getElementById('valor-emprestimo').value = "";
            document.getElementById('etapa-prazo').style.display = 'none';
            document.getElementById('etapa-nome').style.display = 'block';
            document.getElementById('titulo-etapa').innerText = "NOVO REGISTRO (1/3)";
        }
    </script>
</body>
</html>

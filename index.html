<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Van Wallet - Private</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; color: #e0e0e0; overflow-x: hidden; }
        
        /* LOGIN */
        #tela-login { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 9999; }
        #campo-senha-login { padding: 18px; width: 220px; font-size: 24px; text-align: center; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: #d4af37; margin-bottom: 20px; outline: none; letter-spacing: 8px; }
        .btn-acao { padding: 16px 45px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* APP */
        #conteudo-privado { display: none; padding: 20px; max-width: 500px; margin: 0 auto; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .card { background: linear-gradient(145deg, #0f0f0f, #050505); padding: 20px; border-radius: 20px; border: 1px solid #1a1a1a; margin-bottom: 15px; }
        .valor-total { font-size: 32px; font-weight: bold; color: #fff; margin: 10px 0; }
        
        /* STATUS */
        .atraso { border-left: 6px solid #e74c3c; }
        .dia { border-left: 6px solid #2ecc71; }
        .hoje { border-left: 6px solid #f1c40f; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-mini { flex: 1; padding: 12px; border-radius: 10px; text-align: center; font-size: 11px; font-weight: bold; border: 1px solid #222; cursor: pointer; }
        
        /* MODAL (ESCONDE O GITHUB) */
        #janela-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .caixa-alerta { background: #0a0a0a; border: 1px solid #d4af37; padding: 25px; border-radius: 20px; width: 100%; max-width: 340px; }
        .titulo-alerta { color: #d4af37; font-weight: bold; margin-bottom: 15px; font-size: 14px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .texto-alerta { font-size: 13px; color: #ccc; line-height: 1.6; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="tela-login">
        <h2 style="color:#fff; letter-spacing: 4px; font-weight: 300; margin-bottom: 30px;">VAN WALLET</h2>
        <input type="password" id="campo-senha-login" placeholder="••••" maxlength="6" inputmode="numeric">
        <button class="btn-acao" onclick="logar()">CONECTAR</button>
    </div>

    <div id="conteudo-privado">
        <div class="card">
            <div style="font-size:10px; color:#666; letter-spacing:2px;">DINHEIRO NA RUA</div>
            <div class="valor-total" id="soma-total">R$ 0,00</div>
        </div>

        <div id="area-cadastro" class="card" style="border-style: dashed; border-color: #333;">
            <input type="text" id="add-nome" placeholder="Nome do Cliente" style="width:100%; padding:15px; margin-bottom:12px; border-radius:10px; border:1px solid #222; background:#080808; color:#fff; box-sizing: border-box; outline: none;">
            <input type="number" id="add-valor" placeholder="Valor R$" style="width:100%; padding:15px; margin-bottom:15px; border-radius:10px; border:1px solid #222; background:#080808; color:#d4af37; font-weight: bold; box-sizing: border-box; outline: none;">
            <div style="display:flex; gap:8px;">
                <button onclick="salvar(7)" style="flex:1; padding:15px; background:#111; color:#d4af37; border:1px solid #333; border-radius:10px; font-weight: bold;">7D</button>
                <button onclick="salvar(15)" style="flex:1; padding:15px; background:#111; color:#d4af37; border:1px solid #333; border-radius:10px; font-weight: bold;">15D</button>
                <button onclick="salvar(30)" style="flex:1; padding:15px; background:#111; color:#d4af37; border:1px solid #333; border-radius:10px; font-weight: bold;">30D</button>
            </div>
        </div>

        <div id="lista"></div>
    </div>

    <div id="janela-modal">
        <div class="caixa-alerta" id="conteudo-modal"></div>
    </div>

    <script>
        const PIN = "102030";
        const MULTA_VALOR = 40.00;
        let clientes = JSON.parse(localStorage.getItem('v_data_pro')) || [];
        let idFoco = null;

        function logar() {
            if(document.getElementById('campo-senha-login').value === PIN) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                atualizar();
            }
        }

        function salvar(dias) {
            let n = document.getElementById('add-nome').value;
            let v = parseFloat(document.getElementById('add-valor').value);
            if(!n || !v) return;
            let agora = new Date();
            let venc = new Date(); venc.setDate(agora.getDate() + dias);
            clientes.push({ id: Date.now(), nome: n.toUpperCase(), valor: v, totalBase: v * 1.4, data: agora.getTime(), venc: venc.getTime() });
            localStorage.setItem('v_data_pro', JSON.stringify(clientes));
            location.reload();
        }

        function atualizar() {
            let html = ''; let somaGeral = 0; let hoje = new Date(); hoje.setHours(0,0,0,0);
            clientes.forEach(c => {
                let dV = new Date(c.venc); dV.setHours(0,0,0,0);
                let diasAtraso = 0;
                if(hoje > dV) { diasAtraso = Math.floor((hoje - dV)/(1000*60*60*24)); }
                let valorFinal = c.totalBase + (diasAtraso * MULTA_VALOR);
                somaGeral += valorFinal;
                let status = hoje > dV ? 'atraso' : (hoje.getTime() === dV.getTime() ? 'hoje' : 'dia');
                
                // Texto de dias de atraso no card principal
                let textoAtraso = diasAtraso > 0 ? `<div style="color:#e74c3c; font-size:11px; font-weight:bold; margin-top:5px;">⚠️ ATRASADO: ${diasAtraso} DIA(S)</div>` : '';

                html += `<div class="card ${status}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b style="font-size:16px;">${c.nome}</b> 
                        <span style="color:#d4af37; font-size:20px; font-weight:bold;">R$ ${valorFinal.toFixed(2)}</span>
                    </div>
                    <div style="margin-top:5px; font-size:10px; color:#555;">VENCIMENTO: ${dV.toLocaleDateString('pt-br')}</div>
                    ${textoAtraso}
                    <div class="btn-group">
                        <div class="btn-mini" style="background:#1b4d2e; color:#2ecc71" onclick="abrirPago(${c.id})">PAGO</div>
                        <div class="btn-mini" style="background:#1a1a1a; color:#d4af37" onclick="abrirInf(${c.id})">INFO</div>
                    </div>
                </div>`;
            });
            document.getElementById('lista').innerHTML = html;
            document.getElementById('soma-total').innerText = "R$ " + somaGeral.toLocaleString('pt-br', {minimumFractionDigits: 2});
        }

        function abrirInf(id) {
            let c = clientes.find(x => x.id === id);
            let dV = new Date(c.venc); dV.setHours(0,0,0,0);
            let dE = new Date(c.data);
            let hoje = new Date(); hoje.setHours(0,0,0,0);
            let diasAtraso = (hoje > dV) ? Math.floor((hoje - dV)/(1000*60*60*24)) : 0;
            
            document.getElementById('conteudo-modal').innerHTML = `
                <div class="titulo-alerta">INFO DETALHADA</div>
                <div class="texto-alerta">
                    <b>Cliente:</b> ${c.nome}<br>
                    <b>Investido:</b> R$ ${c.valor.toFixed(2)}<br>
                    <b>Empréstimo:</b> ${dE.toLocaleDateString('pt-br')}<br>
                    <b>Vencimento:</b> ${dV.toLocaleDateString('pt-br')}<br><br>
                    <div style="background:#111; padding:10px; border-radius:10px; border:1px solid #333;">
                        <b style="color:#e74c3c">DIAS DE ATRASO: ${diasAtraso}</b><br>
                        <b>Multa Diária:</b> R$ 40,00<br>
                        <b style="color:#d4af37">Multa Total: R$ ${(diasAtraso * 40).toFixed(2)}</b>
                    </div>
                </div>
                <button class="btn-acao" style="width:100%; background:#d4af37; color:#000;" onclick="fechar()">FECHAR</button>`;
            document.getElementById('janela-modal').style.display = 'flex';
        }

        function abrirPago(id) {
            idFoco = id;
            document.getElementById('conteudo-modal').innerHTML = `
                <div class="titulo-alerta">CONFIRMAR PAGO</div>
                <input type="password" id="senha-pago" class="input-modal" style="width:100%; padding:15px; border-radius:10px; border:1px solid #333; background:#000; color:#fff; text-align:center; box-sizing:border-box;" placeholder="PIN" inputmode="numeric">
                <button class="btn-acao" style="width:100%; background:#2ecc71; color:#000; margin-top:15px;" onclick="confirmar()">BAIXA</button>
                <button onclick="fechar()" style="background:none; border:none; color:#555; width:100%; margin-top:15px; font-weight:bold; font-size:10px;">CANCELAR</button>
                <div id="erro-pago" style="color:#e74c3c; font-size:11px; margin-top:10px; text-align:center;"></div>`;
            document.getElementById('janela-modal').style.display = 'flex';
        }

        function confirmar() {
            if(document.getElementById('senha-pago').value === PIN) {
                clientes = clientes.filter(c => c.id !== idFoco);
                localStorage.setItem('v_data_pro', JSON.stringify(clientes));
                location.reload();
            } else { document.getElementById('erro-pago').innerText = "SENHA INCORRETA"; }
        }

        function fechar() { document.getElementById('janela-modal').style.display = 'none'; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wallet</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: #fff; }
        
        /* TOPO IGUAL À FOTO */
        #topo { background: #0f0f0f; margin: 20px; padding: 25px; border-radius: 25px; border: 1px solid #1a1a1a; }
        .label-topo { color: #555; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .valor-topo { font-size: 34px; font-weight: bold; }

        /* AREA DE CADASTRO EM ETAPAS */
        #cadastro { margin: 20px; padding: 20px; border: 1px dashed #333; border-radius: 25px; min-height: 150px; }
        .etapa { display: none; }
        .etapa.ativa { display: block; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #222; background: #080808; color: #fff; box-sizing: border-box; outline: none; font-size: 16px; }
        
        .btn-proximo { width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        
        .btn-dias { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-dias button { flex: 1; padding: 15px; background: #0a0a0a; color: #d4af37; border: 1px solid #222; border-radius: 12px; font-weight: bold; min-width: 60px; }
        
        /* LISTA DE CLIENTES */
        .card { background: #0a0a0a; margin: 20px; padding: 20px; border-radius: 20px; border: 1px solid #1a1a1a; border-left: 5px solid #2ecc71; }
        .card.atrasado { border-left-color: #e74c3c; }
        
        .row { display: flex; justify-content: space-between; align-items: center; }
        .nome-cli { font-size: 16px; font-weight: bold; text-transform: uppercase; }
        .valor-cli { font-size: 20px; color: #d4af37; font-weight: bold; }
        .info-atraso { color: #e74c3c; font-size: 12px; font-weight: bold; margin-top: 8px; }
        
        .btn-pago { width: 100%; margin-top: 15px; padding: 12px; background: #1b4d2e; color: #2ecc71; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="topo">
        <div class="label-topo">DINHEIRO NA RUA</div>
        <div class="valor-topo" id="soma-total">R$ 0,00</div>
    </div>

    <div id="cadastro">
        <div id="etapa1" class="etapa ativa">
            <input type="text" id="add-nome" placeholder="Nome do Cliente">
            <button class="btn-proximo" onclick="irPara(2)">Avançar</button>
        </div>

        <div id="etapa2" class="etapa">
            <input type="number" id="add-valor" placeholder="Valor do Empréstimo R$">
            <button class="btn-proximo" onclick="irPara(3)">Avançar</button>
        </div>

        <div id="etapa3" class="etapa">
            <div class="btn-dias">
                <button onclick="finalizar(7)">7D</button>
                <button onclick="finalizar(15)">15D</button>
                <button onclick="finalizar(30)">30D</button>
            </div>
            <p style="text-align:center; font-size:10px; color:#555; margin: 10px 0;">OU ESCOLHA UMA DATA:</p>
            <input type="date" id="data-custom" onchange="finalizarCustom()">
            <button style="width:100%; background:none; border:none; color:#555; margin-top:10px;" onclick="irPara(1)">Cancelar</button>
        </div>
    </div>

    <div id="lista"></div>

    <script>
        let clientes = JSON.parse(localStorage.getItem('v_wallet_data')) || [];

        function irPara(num) {
            document.querySelectorAll('.etapa').forEach(e => e.classList.remove('ativa'));
            document.getElementById('etapa' + num).classList.add('ativa');
        }

        function finalizar(dias) {
            let n = document.getElementById('add-nome').value;
            let v = parseFloat(document.getElementById('add-valor').value);
            if(!n || !v) return irPara(1);
            
            let venc = new Date();
            venc.setDate(venc.getDate() + dias);
            salvarDados(n, v, venc.getTime());
        }

        function finalizarCustom() {
            let n = document.getElementById('add-nome').value;
            let v = parseFloat(document.getElementById('add-valor').value);
            let dataSelt = document.getElementById('data-custom').value;
            if(!dataSelt) return;
            
            let venc = new Date(dataSelt);
            venc.setHours(23,59,59);
            salvarDados(n, v, venc.getTime());
        }

        function salvarDados(nome, valor, vencimento) {
            clientes.push({
                id: Date.now(),
                nome: nome.toUpperCase(),
                valorOriginal: valor,
                totalComJuros: valor * 1.4,
                venc: vencimento
            });
            localStorage.setItem('v_wallet_data', JSON.stringify(clientes));
            location.reload();
        }

        function atualizar() {
            let html = ''; let somaGeral = 0;
            let hoje = new Date(); hoje.setHours(0,0,0,0);

            clientes.forEach(c => {
                let dV = new Date(c.venc); dV.setHours(0,0,0,0);
                let diasAtraso = (hoje > dV) ? Math.floor((hoje - dV)/(1000*60*60*24)) : 0;
                let valorFinal = c.totalComJuros + (diasAtraso * 40);
                somaGeral += valorFinal;

                html += `<div class="card ${diasAtraso > 0 ? 'atrasado' : ''}">
                    <div class="row">
                        <div class="nome-cli">${c.nome}</div>
                        <div class="valor-cli">R$ ${valorFinal.toFixed(2)}</div>
                    </div>
                    ${diasAtraso > 0 ? `<div class="info-atraso">⚠️ ATRASO: ${diasAtraso} DIA(S)</div>` : ''}
                    <button class="btn-pago" onclick="baixar(${c.id})">CONFIRMAR PAGO</button>
                </div>`;
            });

            document.getElementById('lista').innerHTML = html;
            document.getElementById('soma-total').innerText = "R$ " + somaGeral.toLocaleString('pt-br', {minimumFractionDigits: 2});
        }

        function baixar(id) {
            clientes = clientes.filter(c => c.id !== id);
            localStorage.setItem('v_wallet_data', JSON.stringify(clientes));
            location.reload();
        }

        atualizar();
    </script>
</body>
</html>

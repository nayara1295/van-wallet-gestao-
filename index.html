<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAN WALLET V2</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; font-family: sans-serif; color: #fff; overflow: hidden; }
        
        #aviso-erro {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #ff4d4d; color: #000; padding: 15px 30px; border-radius: 15px;
            font-weight: 900; z-index: 11000;
        }

        #tela-login { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        
        .pin-field { 
            padding: 20px; width: 200px; border-radius: 15px; border: 2px solid #d4af37; 
            background: #111; color: #d4af37; font-size: 30px; text-align: center; 
            outline: none; margin-bottom: 20px;
        }

        .shake { animation: shake 0.3s; border-color: #ff4d4d !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        #conteudo-privado { display: none; padding: 20px; height: 100vh; overflow-y: auto; }
        .card-total { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; text-align: center; margin-bottom: 20px; border-bottom: 4px solid #d4af37; }
        
        .cliente-card { background: #111; border-radius: 15px; margin-bottom: 10px; padding: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .card-atraso { border-left: 5px solid #ff4d4d; }
        .card-hoje { border-left: 5px solid #d4af37; }
        .card-ok { border-left: 5px solid #00ff00; }
        
        .btn-baixa { background: #ff4d4d; color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 12px; margin: 5px; width: 80%; border-radius: 8px; border: 1px solid #d4af37; background: #000; color: #fff; }
    </style>
</head>
<body>

    <div id="aviso-erro">PIN INCORRETO!</div>

    <div id="tela-login">
        <h1 style="color:#d4af37">VAN WALLET</h1>
        <p>Digite o PIN para entrar:</p>
        <input type="number" id="campo-pin" class="pin-field" placeholder="0000" pattern="\d*">
        <button onclick="tentarLogin()" style="padding:15px 40px; border-radius:10px; font-weight:bold;">ENTRAR</button>
    </div>

    <div id="conteudo-privado">
        <div class="card-total">
            <h2 id="total-rua">R$ 0,00</h2>
            <button onclick="document.getElementById('modal-add').style.display='flex'" style="width:100%; padding:10px;">+ NOVO</button>
        </div>
        <div id="lista"></div>
    </div>

    <div id="modal-add" class="modal">
        <input type="text" id="n-nome" placeholder="Nome do Cliente">
        <input type="number" id="n-valor" placeholder="Valor Emprestado">
        <input type="date" id="n-data">
        <button onclick="salvar()" style="padding:15px; width:80%; background:#00ff00; margin-top:10px;">SALVAR</button>
        <button onclick="document.getElementById('modal-add').style.display='none'" style="background:none; color:grey; border:none; margin-top:10px;">FECHAR</button>
    </div>

    <script>
        const PIN_MEU = "9656";
        let db = JSON.parse(localStorage.getItem('van_db_v3')) || [];

        // Tenta login ao digitar
        document.getElementById('campo-pin').addEventListener('input', function(e) {
            if(this.value.length === 4) {
                tentarLogin();
            }
        });

        function tentarLogin() {
            const digitado = document.getElementById('campo-pin').value;
            if(digitado === PIN_MEU) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                render();
            } else {
                const aviso = document.getElementById('aviso-erro');
                aviso.style.display = 'block';
                document.getElementById('campo-pin').classList.add('shake');
                setTimeout(() => {
                    aviso.style.display = 'none';
                    document.getElementById('campo-pin').classList.remove('shake');
                    document.getElementById('campo-pin').value = "";
                }, 1500);
            }
        }

        function salvar() {
            const nome = document.getElementById('n-nome').value;
            const valor = parseFloat(document.getElementById('n-valor').value);
            const data = document.getElementById('n-data').value;
            if(!nome || !valor || !data) return;

            const dVenc = new Date(data + "T12:00:00");
            dVenc.setDate(dVenc.getDate() + 7); // Padrão 7 dias

            db.push({
                id: Date.now(),
                nome: nome,
                valor: valor * 1.4,
                vencimento: dVenc.getTime(),
                diaSemana: dVenc.toLocaleDateString('pt-BR', {weekday: 'long'})
            });

            localStorage.setItem('van_db_v3', JSON.stringify(db));
            document.getElementById('modal-add').style.display = 'none';
            render();
        }

        function baixar(id) {
            if(confirm("Confirmar Recebimento?")) {
                db = db.filter(x => x.id !== id);
                localStorage.setItem('van_db_v3', JSON.stringify(db));
                render();
            }
        }

        function render() {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            let total = 0;
            const hoje = new Date().setHours(0,0,0,0);

            db.forEach(i => {
                const diff = Math.ceil((i.vencimento - hoje) / 86400000);
                let multa = diff < 0 ? Math.abs(diff) * 40 : 0;
                let valorFinal = i.valor + multa;
                total += valorFinal;

                let classe = diff < 0 ? "card-atraso" : (diff === 0 ? "card-hoje" : "card-ok");
                let txt = diff < 0 ? `ATRASADO ${Math.abs(diff)} DIA(S)` : (diff === 0 ? "VENCE HOJE" : `VENCERÁ EM ${diff} DIA(S)`);

                lista.innerHTML += `
                    <div class="cliente-card ${classe}">
                        <div>
                            <b>${i.nome.toUpperCase()}</b><br>
                            <span style="font-size:20px; font-weight:bold">R$ ${valorFinal.toFixed(2)}</span><br>
                            <small>${i.diaSemana.toUpperCase()} | ${txt}</small>
                        </div>
                        <button class="btn-baixa" onclick="baixar(${i.id})">OK</button>
                    </div>
                `;
            });
            document.getElementById('total-rua').innerText = "R$ " + total.toFixed(2);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAN WALLET - CONTROLE TOTAL</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Inter', sans-serif; color: #fff; }
        #login { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
        input { padding: 18px; margin: 10px; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: #fff; font-size: 20px; width: 75%; text-align: center; outline: none; }
        button { padding: 18px; width: 80%; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-entrar { background: #fff; color: #000; }
        #app { display: none; padding: 20px; max-width: 450px; margin: 0 auto; }
        .card-topo { background: linear-gradient(145deg, #111, #050505); border: 1px solid #1a1a1a; padding: 25px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        
        .cliente { border-radius: 18px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .card-ok { background: linear-gradient(145deg, #0a180a, #040804); border-color: #1e3a1e; }
        .card-hoje { background: linear-gradient(145deg, #2a2006, #110d02); border-color: #d4af37; }
        .card-atraso { background: linear-gradient(145deg, #2a0a0a, #110404); border-color: #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.1); }

        .valor-receber { font-size: 24px; font-weight: 900; color: #fff; display: block; margin: 2px 0; }
        .multa-tag { font-size: 11px; background: #ff4d4d; color: #fff; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .status-badge { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; display: block; }
        .btn-ok { width: auto; padding: 12px; background: rgba(255,255,255,0.1); color: #fff; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login">
        <h1 style="letter-spacing: 5px;">VAN WALLET</h1>
        <input type="password" id="pinInput" placeholder="PIN" maxlength="6">
        <button class="btn-entrar" onclick="validar()">CONECTAR</button>
    </div>

    <div id="app">
        <div class="card-topo">
            <small style="color: #666;">VALOR TOTAL A RECEBER</small>
            <h2 id="total" style="font-size: 36px; margin: 10px 0; color: #d4af37;">R$ 0,00</h2>
        </div>
        
        <button onclick="novo()" style="background:#fff; color:#000; width:100%; margin-bottom: 30px;">+ NOVO REGISTRO</button>
        <div id="lista"></div>
    </div>

    <script>
        function validar() {
            if(document.getElementById('pinInput').value === "102030") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                mostrar();
            } else { alert("ACESSO NEGADO"); }
        }

        let dados = JSON.parse(localStorage.getItem('van_v5')) || [];

        function novo() {
            const n = prompt("Nome do Cliente:");
            const v = prompt("Valor Emprestado (R$):");
            const d = prompt("Dias de Prazo (7, 15 ou 30):");
            
            if(n && v && d) {
                const hoje = new Date();
                hoje.setHours(0,0,0,0);
                const venc = new Date(hoje);
                venc.setDate(hoje.getDate() + parseInt(d));
                
                dados.push({
                    id: Date.now(),
                    nome: n,
                    emprestado: parseFloat(v),
                    receberBase: parseFloat(v) * 1.40, // 40% fixo
                    venci: venc.getTime()
                });
                
                localStorage.setItem('van_v5', JSON.stringify(dados));
                mostrar();
            }
        }

        function mostrar() {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            let somaGeral = 0;
            const agora = new Date(); agora.setHours(0,0,0,0);
            const hojeTs = agora.getTime();

            dados.sort((a, b) => a.venci - b.venci);

            dados.forEach(i => {
                const diff = Math.ceil((i.venci - hojeTs) / (1000*60*60*24));
                let valorFinal = i.receberBase;
                let multaAcumulada = 0;
                
                let classe = "card-ok", corTxt = "#00ff00", statusTxt = `Faltam ${diff} dias`;
                
                if(diff === 0) { 
                    classe = "card-hoje"; corTxt = "#fff"; statusTxt = "VENCE HOJE"; 
                } else if(diff < 0) { 
                    // CÁLCULO DA MULTA: 30 REAIS POR DIA DE ATRASO
                    const diasAtraso = Math.abs(diff);
                    multaAcumulada = diasAtraso * 30;
                    valorFinal = i.receberBase + multaAcumulada;
                    
                    classe = "card-atraso"; corTxt = "#fff"; 
                    statusTxt = `ATRASADO ${diasAtraso} DIAS`; 
                }

                somaGeral += valorFinal;

                lista.innerHTML += `
                <div class="cliente ${classe}">
                    <div>
                        <b style="font-size: 16px;">${i.nome}</b>
                        ${multaAcumulada > 0 ? `<span class="multa-tag">+ R$ ${multaAcumulada} MULTA</span>` : ''}
                        <br>
                        <span style="font-size: 11px; color: #888;">Capital: R$ ${i.emprestado.toFixed(2)}</span>
                        <span class="valor-receber">R$ ${valorFinal.toFixed(2)}</span>
                        <span class="status-badge" style="color:${corTxt}">${statusTxt}</span>
                    </div>
                    <button class="btn-ok" onclick="baixar(${i.id})">RECEBER</button>
                </div>`;
            });
            document.getElementById('total').innerText = "R$ " + somaGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        }

        function baixar(id) {
            if(confirm("Confirmar que o cliente pagou o valor TOTAL com a multa?")) {
                dados = dados.filter(x => x.id !== id);
                localStorage.setItem('van_v5', JSON.stringify(dados));
                mostrar();
            }
        }
    </script>
</body>
</html>

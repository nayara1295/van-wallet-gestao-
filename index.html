<div class="card-topo" id="card-cadastro" style="margin-top: 15px; border-style: dashed; border-color: #333; min-height: 180px;">
    
    <div class="label" id="titulo-etapa" style="margin-bottom: 20px; text-align: center; letter-spacing: 2px;">NOVO REGISTRO (1/3)</div>

    <div id="etapa-nome">
        <input type="text" id="nome-cliente" placeholder="Nome do Cliente" 
            style="width: 100%; padding: 18px; border-radius: 12px; border: 1px solid #222; background: #080808; color: #fff; font-size: 16px; outline: none; box-sizing: border-box;">
        
        <button class="btn-acessar" style="width: 100%; margin-top: 20px; background: #d4af37; color: #000;" onclick="irParaValor()">
            AVANÇAR
        </button>
    </div>

    <div id="etapa-valor" style="display: none;">
        <input type="number" id="valor-emprestimo" placeholder="Valor R$" 
            style="width: 100%; padding: 18px; border-radius: 12px; border: 1px solid #222; background: #080808; color: #d4af37; font-size: 22px; text-align: center; outline: none; box-sizing: border-box;">
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="voltarParaNome()" style="flex: 1; background: none; border: 1px solid #333; color: #666; border-radius: 12px; cursor: pointer;">Voltar</button>
            <button class="btn-acessar" style="flex: 2; background: #fff; color: #000;" onclick="irParaVencimento()">
                AVANÇAR
            </button>
        </div>
    </div>

    <div id="etapa-vencimento" style="display: none;">
        </div>

</div>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAN WALLET - V2 PREMIUM</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; font-family: 'Inter', sans-serif; color: #fff; overflow-x: hidden; }
        
        #aviso-erro {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #ff4d4d; color: #000; padding: 15px 30px; border-radius: 15px;
            font-weight: 900; z-index: 11000; box-shadow: 0 10px 30px rgba(255,77,77,0.5);
        }

        #tela-login { position: fixed; inset: 0; background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .logo-login { letter-spacing: 5px; color: #d4af37; font-size: 32px; font-weight: 900; margin-bottom: 30px; }
        
        .pin-field { 
            padding: 20px; width: 180px; border-radius: 20px; border: 2px solid #d4af37; 
            background: #111; color: #d4af37; font-size: 35px; text-align: center; 
            outline: none; margin-bottom: 20px; letter-spacing: 12px; display: block;
        }
        .shake { animation: shake 0.3s; border-color: #ff4d4d !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .btn-gold { padding: 18px; width: 280px; background: #fff; color: #000; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #conteudo-privado { display: none; padding: 20px; max-width: 450px; margin: 0 auto; padding-bottom: 100px; }
        .card-total { background: linear-gradient(145deg, #151515, #050505); padding: 30px; border-radius: 25px; border: 1px solid #222; text-align: center; margin: 20px 0; border-bottom: 3px solid #d4af37; }
        
        .cliente-card { border-radius: 22px; margin-bottom: 15px; padding: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .card-ok { background: linear-gradient(145deg, #0a180a, #040804); border-color: #1e3a1e; }
        .card-hoje { background: linear-gradient(145deg, #2a2006, #110d02); border-color: #d4af37; }
        .card-atraso { background: linear-gradient(145deg, #2a0a0a, #110404); border-color: #ff4d4d; }
        
        .acoes-btn { display: flex; flex-direction: column; gap: 6px; min-width: 95px; }
        .baixa-btn { background: #00ff00; color: #000; border: none; padding: 10px; border-radius: 10px; font-size: 11px; font-weight: 900; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .input-cadastro { padding: 18px; width: 85%; border-radius: 12px; border: 2px solid #d4af37; background: #1a1a1a; color: #fff; font-size: 20px; text-align: center; outline: none; margin: 15px auto; display: block; }
    </style>
</head>
<body>

    <div id="aviso-erro">PIN INCORRETO!</div>

    <div id="tela-login">
        <div class="logo-login">VAN WALLET</div>
        <input type="number" id="pin-input" class="pin-field" placeholder="0000" pattern="\d*">
        <button class="btn-gold" onclick="tentarEntrar()">ENTRAR</button>
    </div>

    <div id="conteudo-privado">
        <div class="card-total">
            <small style="color: #666; font-weight: bold;">TOTAL NA RUA</small>
            <h1 id="total-rua" style="font-size: 45px; margin: 10px 0; color:#d4af37">R$ 0,00</h1>
        </div>
        <button class="btn-gold" style="width: 100%; border-radius: 20px;" onclick="abrirModal()">+ NOVO EMPRÉSTIMO</button>
        <div id="lista-clientes" style="margin-top: 30px;"></div>
    </div>

    <div id="modal-cadastro" class="modal-overlay">
        <h2 style="color:#d4af37">Novo Cliente</h2>
        <input type="text" id="n-nome" class="input-cadastro" placeholder="Nome">
        <input type="number" id="n-valor" class="input-cadastro" placeholder="Valor">
        <input type="date" id="n-data" class="input-cadastro">
        <button class="btn-gold" style="background:#00ff00" onclick="salvar()">SALVAR</button>
        <p onclick="fecharModal()" style="color:#666; margin-top:15px;">CANCELAR</p>
    </div>

    <script>
        const PIN_MEU = "9656";
        let db = JSON.parse(localStorage.getItem('van_vFinal_99')) || [];

        // ESCUTADOR DE TECLADO (LOGIN AUTOMÁTICO)
        document.getElementById('pin-input').addEventListener('input', function(e) {
            if(this.value.length === 4) tentarEntrar();
        });

        function tentarEntrar() {
            const v = document.getElementById('pin-input').value;
            if(v === PIN_MEU) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                render();
            } else {
                const campo = document.getElementById('pin-input');
                document.getElementById('aviso-erro').style.display = 'block';
                campo.classList.add('shake');
                setTimeout(() => {
                    document.getElementById('aviso-erro').style.display = 'none';
                    campo.classList.remove('shake');
                    campo.value = "";
                }, 1500);
            }
        }

        function abrirModal() { 
            document.getElementById('modal-cadastro').style.display = 'flex'; 
            document.getElementById('n-data').valueAsDate = new Date();
        }
        function fecharModal() { document.getElementById('modal-cadastro').style.display = 'none'; }

        function salvar() {
            const n = document.getElementById('n-nome').value, v = parseFloat(document.getElementById('n-valor').value), d = document.getElementById('n-data').value;
            if(!n || !v || !d) return;
            const dV = new Date(d + "T12:00:00"); dV.setDate(dV.getDate() + 7);
            db.push({ id: Date.now(), nome: n, valT: v * 1.4, venci: dV.getTime(), dia: dV.toLocaleDateString('pt-BR', {weekday: 'long'}) });
            localStorage.setItem('van_vFinal_99', JSON.stringify(db));
            fecharModal(); render();
        }

        function baixar(id) {
            if(confirm("Confirmar recebimento?")) {
                db = db.filter(x => x.id !== id);
                localStorage.setItem('van_vFinal_99', JSON.stringify(db));
                render();
            }
        }

        function render() {
            const lista = document.getElementById('lista-clientes'); lista.innerHTML = "";
            let t = 0; const hoje = new Date().setHours(0,0,0,0);
            db.sort((a,b) => a.venci - b.venci).forEach(i => {
                const diff = Math.ceil((i.venci - hoje) / 86400000);
                let totalC = i.valT + (diff < 0 ? Math.abs(diff) * 40 : 0);
                t += totalC;
                let cl = diff < 0 ? "card-atraso" : (diff === 0 ? "card-hoje" : "card-ok");
                let st = diff < 0 ? `ATRASADO ${Math.abs(diff)} DIA(S)` : (diff === 0 ? "VENCE HOJE" : `VENCERÁ EM ${diff} DIA(S)`);
                lista.innerHTML += `
                    <div class="cliente-card ${cl}">
                        <div>
                            <span style="font-weight:600; text-transform: uppercase; font-size: 13px;">${i.nome}</span><br>
                            <span style="font-size:26px; font-weight:900;">R$ ${totalC.toFixed(2)}</span><br>
                            <small style="color:#d4af37; font-weight:bold;">${i.dia.toUpperCase()}</small><br>
                            <small>${st}</small>
                        </div>
                        <button class="baixa-btn" onclick="baixar(${i.id})">BAIXAR</button>
                    </div>`;
            });
            document.getElementById('total-rua').innerText = "R$ " + t.toLocaleString('pt-BR', {minimumFractionDigits:2});
        }
    </script>
</body>
</html>

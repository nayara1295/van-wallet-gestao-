<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VAN WALLET - V2</title><style>
body, html { margin: 0; padding: 0; height: 100%; background-color: #000; font-family: 'Inter', sans-serif; color: #fff; }

#tela-login { position: fixed; inset: 0; background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }

.logo-login { letter-spacing: 5px; color: #d4af37; font-size: 32px; font-weight: 900; margin-bottom: 30px; }

input#pin { padding: 20px; width: 240px; border-radius: 15px; border: 2px solid #d4af37; background: #111; color: #d4af37; font-size: 28px; text-align: center; outline: none; margin-bottom: 20px; letter-spacing: 8px; }

.btn-gold { padding: 18px; width: 280px; background: #fff; color: #000; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

#conteudo-privado { display: none; padding: 20px; max-width: 450px; margin: 0 auto; padding-bottom: 80px; }

.card-total { background: linear-gradient(145deg, #151515, #050505); padding: 30px; border-radius: 25px; border: 1px solid #222; text-align: center; margin: 20px 0; }

.input-cadastro { padding: 18px; width: 85%; border-radius: 12px; border: 2px solid #d4af37; background: #1a1a1a; color: #fff !important; font-size: 20px; text-align: center; outline: none; margin: 15px auto; display: block; }

.cliente-card { border-radius: 22px; margin-bottom: 15px; padding: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }

.card-ok { background: linear-gradient(145deg, #0a180a, #040804); border-color: #1e3a1e; }
.card-hoje { background: linear-gradient(145deg, #2a2006, #110d02); border-color: #d4af37; }
.card-atraso { background: linear-gradient(145deg, #2a0a0a, #110404); border-color: #ff4d4d; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

.step { display: none; text-align: center; width: 100%; }
.step.active { display: block; }

.btn-prazo { background: transparent; border: 2px solid #333; color: #666; padding: 12px; width: 70px; border-radius: 10px; margin: 3px; font-weight: 700; cursor: pointer; font-size: 12px; }
.btn-prazo.selecionado { border-color: #d4af37; color: #d4af37; background: rgba(212,175,55,0.1); }

.acoes-btn { display: flex; flex-direction: column; gap: 5px; min-width: 85px; }

.baixa-btn { background: #00ff00; color: #000; border: none; padding: 8px; border-radius: 8px; font-size: 10px; font-weight: 900; cursor: pointer; }
.edit-btn { background: #fff; color: #000; border: none; padding: 8px; border-radius: 8px; font-size: 10px; font-weight: 900; cursor: pointer; }
.info-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 8px; border-radius: 8px; font-size: 10px; font-weight: 900; cursor: pointer; }

.valor-receber { font-size: 24px; font-weight: 900; color: #fff; display: block; margin: 2px 0; }
.txt-multa { color: #ff4d4d; font-size: 11px; font-weight: 900; display: block; margin-top: 2px; }

/* CALCULADORA (AJUSTADA) */
#calc-fab {
position: fixed;
bottom: 20px;
right: 20px;
width: 45px;
height: 45px;
background: #d4af37;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
box-shadow: 0 5px 15px rgba(212,175,55,0.4);
z-index: 6000;
cursor: pointer;
color: #000;
font-weight: 900;
border: none;
}

#calc-container {
display: none;
position: fixed;
bottom: 90px;
right: 20px;
width: 280px;
background: #151515;
border: 2px solid #d4af37;
border-radius: 20px;
padding: 15px;
z-index: 6000;
box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

#calc-display {
width: 100%;
height: 50px;
background: #000;
border: 1px solid #333;
color: #00ff00;
font-family: monospace;
font-size: 24px;
text-align: right;
padding: 10px;
box-sizing: border-box;
border-radius: 10px;
margin-bottom: 10px;
}

.calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

.calc-btn { padding: 15px; border-radius: 10px; border: none; background: #333; color: #fff; font-weight: bold; cursor: pointer; font-size: 18px; }
.calc-btn-op { background: #d4af37; color: #000; }
.calc-btn-clear { background: #ff4d4d; color: #fff; grid-column: span 2; }
</style></head><body><div id="tela-login">
<div class="logo-login">VAN WALLET</div>
<input type="password" id="pin" placeholder="••••" maxlength="4" inputmode="numeric">
<button class="btn-gold" onclick="login()">ACESSAR CONTA</button>
</div><div id="conteudo-privado">
<div class="card-total">
<small style="color: #666; letter-spacing: 2px;">TOTAL A RECEBER</small>
<h1 id="total-rua" style="font-size: 42px; margin: 10px 0; color:#d4af37">R$ 0,00</h1>
</div><button class="btn-gold" style="width: 100%;" onclick="abrirCadastro()">+ NOVO EMPRÉSTIMO</button>

<div id="lista-clientes" style="margin-top: 40px;"></div>
</div><!-- BOTÃO CALCULADORA MODERNO --><button id="calc-fab" onclick="toggleCalc()">⌁</button>

<div id="calc-container">
<div id="calc-display">0</div>
<div class="calc-grid">
<button class="calc-btn calc-btn-clear" onclick="calcClear()">C</button>
<button class="calc-btn calc-btn-op" onclick="calcOp('/')">÷</button>
<button class="calc-btn calc-btn-op" onclick="calcOp('*')">×</button>
<button class="calc-btn" onclick="calcNum('7')">7</button>
<button class="calc-btn" onclick="calcNum('8')">8</button>
<button class="calc-btn" onclick="calcNum('9')">9</button>
<button class="calc-btn calc-btn-op" onclick="calcOp('-')">-</button>
<button class="calc-btn" onclick="calcNum('4')">4</button>
<button class="calc-btn" onclick="calcNum('5')">5</button>
<button class="calc-btn" onclick="calcNum('6')">6</button>
<button class="calc-btn calc-btn-op" onclick="calcOp('+')">+</button>
<button class="calc-btn" onclick="calcNum('1')">1</button>
<button class="calc-btn" onclick="calcNum('2')">2</button>
<button class="calc-btn" onclick="calcNum('3')">3</button>
<button class="calc-btn calc-btn-op" onclick="calcEqual()">=</button>
<button class="calc-btn" style="grid-column: span 2;" onclick="calcNum('0')">0</button>
<button class="calc-btn" onclick="calcNum('.')">.</button>
<button class="calc-btn" onclick="toggleCalc()" style="background: #222;">✖</button>
</div>
</div><script>
const PIN_CORRETO = "9656";
let db = JSON.parse(localStorage.getItem('van_vFinal')) || [];

function login(){
const pin = document.getElementById('pin').value;
if(pin === PIN_CORRETO){
document.getElementById('tela-login').style.display='none';
document.getElementById('conteudo-privado').style.display='block';
render();
}else alert("PIN INCORRETO!");
}

// CALCULADORA SEGURA
let calcExpressao="";
function toggleCalc(){
const c=document.getElementById('calc-container');
c.style.display=c.style.display==='block'?'none':'block';
}
function calcNum(n){ calcExpressao+=n; document.getElementById('calc-display').innerText=calcExpressao; }
function calcOp(op){ if(calcExpressao==="")return; calcExpressao+=op; document.getElementById('calc-display').innerText=calcExpressao; }
function calcClear(){ calcExpressao=""; document.getElementById('calc-display').innerText="0"; }
function calcEqual(){
try{
calcExpressao=Function('return '+calcExpressao)().toString();
document.getElementById('calc-display').innerText=calcExpressao;
}catch{ calcClear(); }
}

// BAIXAR COM PIN
function baixar(id){
const entrada=prompt("Digite o PIN:");
if(entrada!==PIN_CORRETO){ alert("PIN incorreto!"); return; }
db=db.filter(c=>c.id!==id);
localStorage.setItem('van_vFinal',JSON.stringify(db));
render();
}

// RENDER
function render(){
const lista=document.getElementById('lista-clientes');
let html="";
let total=0;
const hoje=new Date().setHours(0,0,0,0);

db.forEach(i=>{
const diff=Math.ceil((i.venci-hoje)/86400000);
let valor=i.baseCobrar;
let multa=0;
let classe="card-ok";

if(diff===0){ classe="card-hoje"; }
else if(diff<0){ multa=Math.abs(diff)*40; valor+=multa; classe="card-atraso"; }

total+=valor;

html+=`
<div class="cliente-card ${classe}">
<div>
<span>${i.nome}</span><br>
<span class="valor-receber">R$ ${valor.toFixed(2)}</span>
</div>
<div class="acoes-btn">
<button class="baixa-btn" onclick="baixar(${i.id})">BAIXAR</button>
</div>
</div>`;
});

lista.innerHTML=html;
document.getElementById('total-rua').innerText="R$ "+total.toLocaleString('pt-BR',{minimumFractionDigits:2});
}
</script></body>
</html>

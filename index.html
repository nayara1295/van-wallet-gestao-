<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van Wallet - Private Banking</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Inter', sans-serif; color: #e0e0e0; overflow-x: hidden; }
        
        #tela-login { 
            position: fixed; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10000; text-align: center; 
        }

        .logo-svg { width: 80px; height: 80px; margin-bottom: 20px; }
        h1 { font-size: 22px; letter-spacing: 3px; color: #fff; margin: 0; font-weight: 300; }
        
        #campo-senha-login { 
            padding: 18px; width: 250px; font-size: 24px; text-align: center; 
            border-radius: 12px; border: 1px solid #333; background: #0a0a0a; 
            color: #d4af37; margin: 30px 0 15px; letter-spacing: 8px; outline: none; 
        }

        .btn-acessar { 
            padding: 16px; width: 250px; background: #fff; color: #000; 
            border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; 
        }

        #conteudo-privado { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
        
        .card-topo { 
            background: linear-gradient(145deg, #0f0f0f, #050505); 
            padding: 20px; border-radius: 20px; border: 1px solid #1a1a1a; 
            margin-top: 20px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
        .valor-principal { font-size: 32px; font-weight: 700; color: #fff; margin: 10px 0; }
        
        .status-em-dia { border-left: 6px solid #2ecc71; }
        .status-vence-hoje { border-left: 6px solid #f1c40f; }
        .status-vencido { border-left: 6px solid #e74c3c; }
        
        .container-botoes { display: flex; gap: 10px; margin-top: 15px; }
        .mini-card { flex: 1; padding: 12px; border-radius: 12px; text-align: center; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; border: 1px solid #333; }
        .btn-pago { background: #1b4d2e; color: #2ecc71; border: 1px solid #2ecc7133; }
        .btn-inf { background: #1a1a1a; color: #d4af37; border: 1px solid #d4af3733; }

        .input-step { width: 100%; padding: 18px; border-radius: 12px; border: 1px solid #222; background: #080808; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn-prazo { flex: 1; padding: 20px; background: #111; color: #d4af37; border: 1px solid #333; border-radius: 15px; font-size: 18px; font-weight: 700; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-verde { background: #2ecc71; }
        .dot-amarelo { background: #f1c40f; }
        .dot-vermelho { background: #e74c3c; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="logo-svg">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 85L20 50H35V15H65V50H80L50 85Z" stroke="#d4af37" stroke-width="4" stroke-linejoin="round"/>
                <circle cx="50" cy="50" r="10" stroke="#d4af37" stroke-width="3" />
            </svg>
        </div>
        <h1>VAN WALLET</h1>
        <input type="password" id="campo-senha-login" placeholder="••••••" maxlength="6" inputmode="numeric">
        <button class="btn-acessar" onclick="fazerLogin()">CONECTAR</button>
        <p id="msg-erro" style="color: #ff4d4d; font-size: 12px; margin-top: 15px; height: 20px;"></p>
    </div>

    <div id="conteudo-privado">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span style="color: #d4af37; font-weight: 600; font-size: 12px;">PRIVATE BANKING</span>
            <button onclick="logout()" style="background:none; border:none; color:#666; cursor:pointer; font-size: 12px;">Sair</button>
        </div>

        <div class="card-topo">
            <div class="label">Dinheiro na Rua</div>
            <div class="valor-principal" id="display-total">R$ 0,00</div>
        </div>

        <div class="card-topo" id="card-cadastro" style="border-style: dashed; border-color: #333;">
            <div id="etapa-nome">
                <input type="text" id="nome-cliente" class="input-step" placeholder="Nome do Cliente">
                <button class="btn-acessar" style="width: 100%; margin-top: 15px; background: #d4af37; color: #000;" onclick="irParaValor()">AVANÇAR</button>
            </div>
            <div id="etapa-valor" style="display: none;">
                <input type="number" id="valor-emprestimo" class="input-step" placeholder="Valor R$" style="text-align: center; color: #d4af37; font-size: 22px;">
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button onclick="location.reload()" style="flex: 1; background: none; border: 1px solid #333; color: #666; border-radius: 12px;">Voltar</button>
                    <button class="btn-acessar" style="flex: 2;" onclick="irParaPrazo()">AVANÇAR</button>
                </div>
            </div>
            <div id="etapa-prazo" style="display: none;">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-prazo" onclick="finalizarComPrazo(7)">7D</button>
                    <button class="btn-prazo" onclick="finalizarComPrazo(15)">15D</button>
                    <button class="btn-prazo" onclick="finalizarComPrazo(30)">30D</button>
                </div>
                <button onclick="abrirDataManual()" style="width:100%; background:none; border:none; color:#555; margin-top:15px; font-size:10px; font-weight: bold;">LANÇAR DATA ANTIGA</button>
            </div>
            <div id="etapa-data-manual" style="display: none;">
                <input type="date" id="data-emprestimo" class="input-step">
                <div style="display: flex; gap: 5px; margin-top:10px;">
                    <button class="btn-prazo" onclick="finalizarComDataEIntervalo(7)">7D</button>
                    <button class="btn-prazo" onclick="finalizarComDataEIntervalo(15)">15D</button>
                    <button class="btn-prazo" onclick="finalizarComDataEIntervalo(30)">30D</button>
                </div>
            </div>
        </div>

        <div id="lista-clientes" style="margin-top: 20px;"></div>
    </div>

    <script>
        const SENHA_MESTRE = "102030";
        const MULTA_DIARIA = 40.00;
        let clientes = JSON.parse(localStorage.getItem('clientes_van_wallet')) || [];

        // Detectar tecla Enter no Login
        document.getElementById('campo-senha-login').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { fazerLogin(); }
        });

        window.onload = function() {
            if(sessionStorage.getItem('van_logado') === 'true') {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                renderizarLista();
            }
        };

        function fazerLogin() {
            const senhaInserida = document.getElementById('campo-senha-login').value;
            if (senhaInserida === SENHA_MESTRE) {
                sessionStorage.setItem('van_logado', 'true');
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-privado').style.display = 'block';
                renderizarLista();
            } else {
                document.getElementById('msg-erro').innerText = "PIN INCORRETO. TENTE NOVAMENTE.";
                document.getElementById('campo-senha-login').value = "";
            }
        }

        function logout() { sessionStorage.clear(); location.reload(); }
        function irParaValor() { if(document.getElementById('nome-cliente').value) { document.getElementById('etapa-nome').style.display='none'; document.getElementById('etapa-valor').style.display='block'; } }
        function irParaPrazo() { if(document.getElementById('valor-emprestimo').value) { document.getElementById('etapa-valor').style.display='none'; document.getElementById('etapa-prazo').style.display='block'; } }
        function abrirDataManual() { document.getElementById('etapa-prazo').style.display='none'; document.getElementById('etapa-data-manual').style.display='block'; }

        function finalizarComPrazo(dias) {
            let agora = new Date();
            let venc = new Date(); venc.setDate(agora.getDate() + dias);
            salvar(agora.getTime(), venc.getTime());
        }

        function finalizarComDataEIntervalo(dias) {
            let input = document.getElementById('data-emprestimo').value;
            if(!input) return alert("Selecione a data!");
            let p = input.split('-');
            let emp = new Date(p[0], p[1]-1, p[2], 12, 0, 0);
            let venc = new Date(emp); venc.setDate(emp.getDate() + dias);
            salvar(emp.getTime(), venc.getTime());
        }

        function salvar(tsEmp, tsVenc) {
            let n = document.getElementById('nome-cliente').value;
            let v = parseFloat(document.getElementById('valor-emprestimo').value);
            clientes.push({ id: Date.now(), nome: n.toUpperCase(), valorOriginal: v, valorRetornoBase: v * 1.40, dataEmprestimo: tsEmp, dataVencimento: tsVenc });
            localStorage.setItem('clientes_van_wallet', JSON.stringify(clientes));
            location.reload();
        }

        function renderizarLista() {
            let lista = document.getElementById('lista-clientes');
            let displayTotal = document.getElementById('display-total');
            lista.innerHTML = ''; let totalGeral = 0;
            let hoje = new Date(); hoje.setHours(0,0,0,0);

            clientes.forEach((c) => {
                let dVenc = new Date(c.dataVencimento); dVenc.setHours(0,0,0,0);
                let dEmp = new Date(c.dataEmprestimo);
                let juros = 0;
                if (hoje > dVenc) {
                    let diff = Math.floor((hoje - dVenc) / (1000 * 60 * 60 * 24));
                    juros = diff * MULTA_DIARIA;
                }
                let totalC = c.valorRetornoBase + juros;
                totalGeral += totalC;
                
                let cor = "status-em-dia"; let pto = "dot-verde";
                if (dVenc.getTime() === hoje.getTime()) { cor = "status-vence-hoje"; pto = "dot-amarelo"; }
                else if (hoje > dVenc) { cor = "status-vencido"; pto = "dot-vermelho"; }

                lista.innerHTML += `
                    <div class="card-topo ${cor}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-weight:bold; font-size:18px;">${c.nome}</span>
                            <span style="color:#d4af37; font-size:22px; font-weight:700;">R$ ${totalC.toFixed(2)}</span>
                        </div>
                        <div style="margin-top:8px; font-size:11px; color:#666;">
                            <span class="dot ${pto}"></span> Emprestado: ${dEmp.toLocaleDateString('pt-br')}
                        </div>
                        <div class="container-botoes">
                            <div class="mini-card btn-pago" onclick="confirmarPagamento(${c.id})">PAGO</div>
                            <div class="mini-card btn-inf" onclick="verInfo(${c.id})">INF</div>
                        </div>
                    </div>
                `;
            });
            displayTotal.innerText = `R$ ${totalGeral.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
        }

        function verInfo(id) {
            let c = clientes.find(x => x.id === id);
            let dE = new Date(c.dataEmprestimo);
            let dV = new Date(c.dataVencimento);
            let diasSemana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
            alert("ℹ️ INFOS GERAIS\n\nCLIENTE: " + c.nome + "\nINVESTIDO: R$ " + c.valorOriginal.toFixed(2) + "\n\nDATA EMPRÉSTIMO:\n" + dE.toLocaleDateString('pt-br') + " (" + diasSemana[dE.getDay()] + ")\nHora: " + dE.getHours().toString().padStart(2, '0') + ":" + dE.getMinutes().toString().padStart(2, '0') + "\n\nVENCIMENTO:\n" + dV.toLocaleDateString('pt-br') + " (" + diasSemana[dV.getDay()] + ")");
        }

        function confirmarPagamento(id) {
            let senha = prompt("Digite a sua senha:");
            if (senha === SENHA_MESTRE) {
                clientes = clientes.filter(c => c.id !== id);
                localStorage.setItem('clientes_van_wallet', JSON.stringify(clientes));
                renderizarLista();
            } else if (senha !== null) { alert("Senha incorreta!"); }
        }
    </script>
</body>
</html>

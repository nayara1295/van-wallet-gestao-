<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira Pessoal Vanubia</title>
    <style>
        /* --- ESTILO BASE E FUNDO (MANTIDO) --- */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #0a192f 0%, #02060c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
            overflow: hidden;
        }

        /* --- CONTAINER CENTRAL (MODIFICADO para suportar animação) --- */
        .login-container {
            background-color: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 350px;
            text-align: center;
            transition: all 0.5s ease-in-out; /* Animação suave de tamanho */
        }

        /* --- LOGO DOURADA (MANTIDA) --- */
        .logo {
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #ffd700; 
            text-shadow: 0 0 5px #ff4500, 0 0 10px #ffd700, 0 0 20px #ffd700;
        }

        /* --- ESTILO DOS CAMPOS DE LOGIN (MANTIDO) --- */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label { display: block; margin-bottom: 5px; color: #a0a0a0; font-size: 14px; }
        .input-group input {
            width: 100%; padding: 12px; background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 16px;
            box-sizing: border-box; transition: all 0.3s ease;
        }
        .input-group input:focus { outline: none; border-color: #ffd700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        /* --- ESTILO DOS BOTÕES DOURADOS (MANTIDO) --- */
        .btn-gold {
            width: 100%; padding: 12px;
            background: linear-gradient(45deg, #bf9b30, #ffd700);
            color: #000; border: none; border-radius: 8px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase;
            letter-spacing: 1px; margin-top: 10px;
        }
        .btn-gold:hover { box-shadow: 0 0 15px #ffd700; transform: translateY(-2px); }

        /* --- CLASSES DE ANIMAÇÃO (NOVO ITEM) --- */
        
        /* Inicialmente, escondemos o formulário de login */
        #loginForm {
            display: none; /* Esconde completamente */
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* Classe que o JavaScript vai adicionar para mostrar o formulário */
        #loginForm.mostrar {
            display: block; /* Mostra o elemento */
            opacity: 1;
            transform: translateY(0);
        }

        /* Estilo para o botão inicial 'Entrar' */
        #btnInicial {
            display: block; /* Visível no início */
        }

        /* Esconde o botão inicial com animação */
        #btnInicial.esconder {
            display: none;
        }

    </style>
</head>
<body>

    <div class="login-container" id="containerPrincipal">
        <div class="logo">
            Carteira Pessoal<br>Vanubia
        </div>

        <button class="btn-gold" id="btnInicial" onclick="revelarLogin()">Entrar</button>

        <form id="loginForm" action="#" method="post" onsubmit="verificarSenha(event)">
            <div class="input-group">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" value="Vanubia" readonly>
            </div>

            <div class="input-group">
                <label for="senha">Senha Segurança</label>
                <input type="password" id="senha" name="senha" placeholder="••••" required autofocus>
            </div>

            <button type="submit" class="btn-gold">Acessar</button>
        </form>

    </div>

    <script>
        // ITEM: LÓGICA DE REVELAÇÃO
        function revelarLogin() {
            const btnInicial = document.getElementById('btnInicial');
            const loginForm = document.getElementById('loginForm');
            
            // 1. Esconde o botão inicial
            btnInicial.classList.add('esconder');
            
            // 2. Mostra o formulário com animação (precisa de um pequeno delay para o display block funcionar com opacity)
            loginForm.style.display = 'block';
            setTimeout(() => {
                loginForm.classList.add('mostrar');
            }, 10);
        }

        // ITEM: VALIDAÇÃO DA SENHA DEFINIDA (9656)
        function verificarSenha(event) {
            event.preventDefault(); // Impede o formulário de recarregar a página

            const senhaDigitada = document.getElementById('senha').value;
            const SENHA_CORRETA = "9656"; // Sua senha definida

            if (senhaDigitada === SENHA_CORRETA) {
                alert("Acesso Autorizado! Bem-vinda à sua Carteira Pessoal, Vanubia.");
                // Próximo passo: Redirecionar para a tela de empréstimos
            } else {
                alert("Senha Incorreta. Tente novamente.");
                document.getElementById('senha').value = ''; // Limpa o campo
                document.getElementById('senha').focus(); // Coloca o cursor de volta
            }
        }
    </script>

</body>
</html>
